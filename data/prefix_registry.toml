# Plane prefix registry — reviewed baseline (source of truth).
#
# A queryable library of USED/ACTIVE sub-project + issue prefixes (the 2-8 char
# item-ID prefixes like SCRB, ROUT, RMDR — NOT the per-repo Plane *project*
# prefixes HARM/LUM/CHRD/TERM/RAIL/HW/PSH).
#
# This file is the git-versioned baseline half of the hybrid prefix store
# (see src/plane/prefix.rs). It is compiled into the terminus binary via
# `include_str!`, so baseline reads always work even with no Redis and no cwd.
# Runtime claims land in the shared Redis overlay first (via
# `plane_prefix_register`); promotion of an overlay claim into this file happens
# later through a small reviewed PR (add a `[[prefix]]` block here, drop the
# overlay claim).
#
# Fields per entry:
#   prefix       required, 2-8 chars, starts with a letter, [A-Z0-9]
#   name         full human-readable name/title
#   project      owning Plane project (HARM/LUM/CHRD/TERM/RAIL/HW/PSH); some
#                pre-consolidation entries are best-effort ("inferred")
#   spec_id      originating spec id (S{session}-{slug}) when known
#   status       active | retired | ingested | complete
#   description  one-line summary
#   created      ISO date (YYYY-MM-DD) when known, else empty
#
# Seeded (S101) from: the moosenet-spec SKILL.md Spec Registry table, a scan of
# scratch/spec-staging spec frontmatter + item headers, and known recent
# session prefixes. De-duped.

