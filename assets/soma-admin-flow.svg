<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#e85c5c"/></marker>
  </defs>

  <rect width="1280" height="400" fill="url(#bg2)"/>

  <text x="640" y="44" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">SOMA ADMIN API</text>
  <text x="640" y="76" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">X-SOMA-KEY HEADER AUTH</text>
  <line x1="480" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="130" width="230" height="70" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="175" y="158" text-anchor="middle" fill="#e8e3f7" font-size="13.5" font-weight="600">soma_* tool call</text>
  <text x="175" y="178" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">validate_path_segment() first</text>

  <line x1="290" y1="165" x2="355" y2="165" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="355" y="130" width="240" height="70" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.2"/>
  <text x="475" y="152" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">SOMA_SECRET_KEY?</text>
  <text x="475" y="172" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">required for every tool except</text>
  <text x="475" y="188" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">soma_status — no dev-key fallback</text>

  <line x1="475" y1="200" x2="475" y2="240" stroke="#e85c5c" stroke-width="1.4" marker-end="url(#arrowRed)"/>
  <rect x="330" y="242" width="290" height="46" rx="10" fill="#2b1c22" stroke="#e85c5c" stroke-width="1"/>
  <text x="475" y="270" text-anchor="middle" fill="#f0b8b8" font-size="11.5">missing → NotConfigured, no request sent</text>

  <line x1="595" y1="165" x2="660" y2="165" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="660" y="130" width="230" height="70" rx="10" fill="#1d1736" stroke="#5b4b9b" stroke-width="1"/>
  <text x="775" y="158" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">GET/POST/PUT SOMA_URL</text>
  <text x="775" y="178" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">header: X-Soma-Key</text>

  <line x1="890" y1="165" x2="960" y2="165" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="960" y="130" width="230" height="70" rx="10" fill="#132a22" stroke="#10b981" stroke-width="1.2"/>
  <text x="1075" y="158" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">Lumina admin panel</text>
  <text x="1075" y="178" text-anchor="middle" fill="#8fe3c0" font-size="10.5" font-family="'Courier New',monospace">constellation.yaml, modules,</text>

  <rect x="150" y="310" width="980" height="66" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="334" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">agent_id / skill_name are path-segment validated (alnum, -, _ only) before URL interpolation</text>
  <text x="640" y="354" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">display_name additionally rejects control chars and bidi-override / invisible-format Unicode</text>
</svg>
