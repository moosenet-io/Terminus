<svg width="1280" height="700" viewBox="0 0 1280 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="700" fill="url(#bg2)"/>

  <text x="640" y="48" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">TWO REGISTRIES, NEVER MERGED</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">FEDERATION TOPOLOGY</text>
  <line x1="470" y1="100" x2="810" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- terminus-primary -->
  <rect x="80" y="150" width="380" height="200" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadow)"/>
  <text x="105" y="180" fill="#a78bff" font-size="13" letter-spacing="3" font-weight="600">TERMINUS-PRIMARY</text>
  <circle cx="440" cy="174" r="5" fill="#c9b8ff"/>
  <text x="105" y="204" fill="#e8e3f7" font-size="12.5" font-weight="600">register_all() — CORE registry</text>
  <text x="105" y="224" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">plane · gitea · github · sundry …</text>
  <rect x="100" y="240" width="340" height="42" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="120" y="266" fill="#e8e3f7" font-size="11" font-family="'Courier New',monospace">mTLS :8311 · plain+JWT :8310</text>
  <rect x="100" y="292" width="340" height="42" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="120" y="318" fill="#e8e3f7" font-size="11" font-family="'Courier New',monospace">gateway_framework · own CA</text>

  <!-- terminus_personal -->
  <rect x="80" y="400" width="380" height="180" rx="14" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.4" filter="url(#cardShadow)"/>
  <text x="105" y="430" fill="#9b92c0" font-size="13" letter-spacing="3" font-weight="600">TERMINUS_PERSONAL</text>
  <circle cx="440" cy="424" r="5" fill="#9b92c0"/>
  <text x="105" y="454" fill="#e8e3f7" font-size="12.5" font-weight="600">register_personal() — PERSONAL registry</text>
  <text x="105" y="474" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">ledger · vitals · git_private · ansible …</text>
  <rect x="100" y="490" width="340" height="42" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="120" y="516" fill="#e8e3f7" font-size="11" font-family="'Courier New',monospace">plain+JWT :8300 · own mTLS :8301</text>

  <!-- collision note -->
  <text x="270" y="600" text-anchor="middle" fill="#e8b45c" font-size="11" font-family="'Courier New',monospace">plane/gitea/github/sundry are registered by BOTH — a merged registry</text>
  <text x="270" y="618" text-anchor="middle" fill="#e8b45c" font-size="11" font-family="'Courier New',monospace">would silently drop entries (duplicate-name warn-and-drop)</text>

  <!-- Chord -->
  <rect x="740" y="260" width="300" height="180" rx="14" fill="#1d1736" stroke="#10b981" stroke-width="1.6" filter="url(#cardShadow)"/>
  <text x="765" y="290" fill="#7fe0b8" font-size="13" letter-spacing="3" font-weight="600">CHORD</text>
  <circle cx="1020" cy="284" r="5" fill="#10b981"/>
  <text x="765" y="314" fill="#e8e3f7" font-size="12.5" font-weight="600">separate repo / process</text>
  <text x="765" y="336" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">/v1/personal/tools/*  relay</text>
  <text x="765" y="352" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">/v1/chat/completions, /v1/infer …</text>
  <text x="765" y="368" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">CHORD_JWT_SECRET, sub="lumina"</text>
  <text x="765" y="400" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">moosenet/Chord</text>

  <!-- MCP clients -->
  <rect x="1080" y="150" width="160" height="70" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="1160" y="180" text-anchor="middle" fill="#e8e3f7" font-size="12.5" font-weight="600">MCP callers</text>
  <text x="1160" y="200" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">Lumina · Harmony</text>

  <!-- arrows -->
  <line x1="1080" y1="195" x2="465" y2="195" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="770" y="188" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">/mcp (mTLS or plain+JWT)</text>

  <line x1="460" y1="230" x2="740" y2="300" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="255" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">tool not in local registry</text>
  <text x="600" y="270" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">→ PersonalFederationClient</text>

  <line x1="900" y1="440" x2="500" y2="480" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrow)" opacity="0.8"/>
  <text x="700" y="470" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">Chord's own existing relay to terminus_personal</text>

  <line x1="460" y1="320" x2="740" y2="380" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="365" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">inference proxy (co-located)</text>

  <rect x="150" y="640" width="980" height="46" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="668" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">Independent CAs per process — terminus-primary and terminus_personal each load-or-generate their own</text>
</svg>
