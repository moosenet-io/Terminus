<svg width="1280" height="820" viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="26%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="820" fill="url(#bg4)"/>

  <text x="640" y="50" text-anchor="middle" fill="#b9b0d8" font-size="15" letter-spacing="7" font-weight="500">MINT · ASSISTANT INTAKE PROFILING</text>
  <text x="640" y="88" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">THE TWO-STEP PERSONALITY READ (dim-4 → dim-5, reporting.rs)</text>
  <line x1="360" y1="106" x2="920" y2="106" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== dim4 + dim5 are independent runners (top) ===== -->
  <text x="150" y="150" fill="#a78bff" font-size="12.5" letter-spacing="4" font-weight="600">STEP 0 · TWO INDEPENDENT DIMENSION RUNNERS (no code coupling between them)</text>
  <g font-size="12.5" font-weight="600">
    <rect x="150" y="164" width="460" height="82" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="172" cy="190" r="5" fill="#4a6cf6"/><text x="186" y="194" fill="#e8e3f7">dim4_ocean.rs · run_dim4()</text>
    <text x="170" y="216" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">personality_latent · base-only prompt</text>
    <text x="170" y="234" fill="#8d84ad" font-size="10" font-weight="400">Writes assistant_dimension_score rows independently — no reference to dim5.</text>

    <rect x="670" y="164" width="460" height="82" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="692" cy="190" r="5" fill="#4a6cf6"/><text x="706" y="194" fill="#e8e3f7">dim5_prompted.rs · run_scenario()</text>
    <text x="690" y="216" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">personality_prompted · real Lumina prompt</text>
    <text x="690" y="234" fill="#8d84ad" font-size="10" font-weight="400">Writes assistant_dimension_score rows independently — no reference to dim4.</text>
  </g>

  <line x1="640" y1="246" x2="640" y2="278" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.6" stroke-dasharray="3,3"/>
  <text x="640" y="268" text-anchor="middle" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">both rows read back by reporting.rs</text>

  <!-- ===== STEP 1 ===== -->
  <text x="150" y="308" fill="#a78bff" font-size="12.5" letter-spacing="4" font-weight="600">STEP 1 · reporting.rs :: ocean_proximity_shortlist()</text>
  <rect x="150" y="320" width="980" height="90" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="175" y="348" fill="#e8e3f7" font-size="13" font-weight="600">Ranks dim-4 rows on proximity_to_lumina, keeps only value ≥ min_proximity (default 3.0)</text>
  <text x="175" y="370" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">produces: OceanShortlist { members: Vec&lt;RankedEntry&gt;, min_proximity }</text>
  <text x="175" y="392" fill="#8d84ad" font-size="10.5" font-weight="400">Base models whose LATENT disposition won't fight the prompt. Never touches a dim-5 row.</text>

  <line x1="640" y1="410" x2="640" y2="442" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrow4)"/>
  <text x="660" y="432" fill="#c9b8ff" font-size="10.5" font-family="'Courier New',monospace">moved BY VALUE — Rust ownership</text>

  <!-- ===== STEP 2 ===== -->
  <text x="150" y="466" fill="#a78bff" font-size="12.5" letter-spacing="4" font-weight="600">STEP 2 · reporting.rs :: rank_shortlist_by_prompted_adherence(shortlist, ...)</text>
  <rect x="150" y="478" width="980" height="96" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.5"/>
  <text x="175" y="506" fill="#e8e3f7" font-size="13" font-weight="600">Takes the STEP-1 shortlist by value — cannot compile without one — then ranks ONLY those</text>
  <text x="175" y="524" fill="#e8e3f7" font-size="13" font-weight="600">members by dim-5 behavioral_mean (tie-break trait_mean)</text>
  <text x="175" y="548" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">produces: Vec&lt;PromptedAdherence&gt; { behavioral_mean, trait_mean, ... }</text>
  <text x="175" y="566" fill="#8d84ad" font-size="10.5" font-weight="400">A model that never cleared STEP 1 is never ranked here — no matter how well it scores on dim-5.</text>

  <line x1="640" y1="574" x2="640" y2="606" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.85"/>

  <!-- ===== chat-role guard ===== -->
  <text x="150" y="630" fill="#a78bff" font-size="12.5" letter-spacing="4" font-weight="600">STEP 3 (optional) · select_chat_role()  — latency / degradation guard</text>
  <rect x="150" y="642" width="980" height="72" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="175" y="668" fill="#e8e3f7" font-size="12.5" font-weight="600">Applies min_recall_ceiling_turns / max_latency_ms to the STEP-2 ranking; first ELIGIBLE candidate wins.</text>
  <text x="175" y="690" fill="#8d84ad" font-size="10.5" font-weight="400">No candidate clears ⇒ selected = None ⇒ report says so; routing keeps the current default chat alias.</text>

  <!-- ===== NEVER AVERAGED band ===== -->
  <rect x="150" y="740" width="980" height="58" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="766" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">PersonalityRead has NO combined_score field — dim-4 proximity and dim-5 adherence are NEVER averaged</text>
  <text x="640" y="786" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">Enforced by Rust ownership (by-value move) + a dedicated test, not by convention — confirmed against reporting.rs</text>
</svg>
