<svg width="1180" height="480" viewBox="0 0 1180 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgvec" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowVec" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowVec" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1180" height="480" fill="url(#bgvec)"/>
  <text x="590" y="44" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">VECTOR · DEV-LOOP TASK STATE MACHINE</text>
  <text x="590" y="76" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700" letter-spacing="2">vector_tasks · 11 tools over VECTOR_DATABASE_URL</text>
  <line x1="380" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="126" width="200" height="60" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="160" y="152" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">pending</text>
  <text x="160" y="170" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">vector_submit</text>

  <line x1="260" y1="156" x2="330" y2="156" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowVec)"/>
  <rect x="330" y="126" width="200" height="60" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="430" y="152" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">running</text>
  <text x="430" y="170" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">external agent claims</text>

  <line x1="530" y1="146" x2="600" y2="146" stroke="#8b5cf6" stroke-width="1.6" marker-end="url(#arrowVec)"/>
  <text x="565" y="138" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">halt</text>
  <rect x="600" y="116" width="200" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="700" y="142" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">halted</text>
  <text x="700" y="160" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">vector_halt / vector_resume</text>
  <line x1="600" y1="166" x2="530" y2="166" stroke="#8b5cf6" stroke-width="1.6" marker-end="url(#arrowVec)" opacity="0.8"/>
  <text x="565" y="184" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">resume</text>

  <line x1="430" y1="186" x2="430" y2="240" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrowVec)"/>
  <rect x="330" y="240" width="200" height="60" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
  <text x="430" y="266" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">done</text>
  <text x="430" y="284" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">vector_clear_done deletes</text>

  <line x1="530" y1="270" x2="600" y2="270" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrowVec)" opacity="0.7"/>
  <rect x="600" y="240" width="200" height="60" rx="10" fill="#241c42" stroke="#f66" stroke-width="1.2"/>
  <text x="700" y="266" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">error</text>
  <text x="700" y="284" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">vector_last_error surfaces it</text>

  <!-- read-only reporting tools -->
  <text x="90" y="340" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">READ-ONLY REPORTING</text>
  <g font-size="11.5" font-weight="600" fill="#e8e3f7">
    <rect x="60" y="352" width="170" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="145" y="372" text-anchor="middle">vector_status</text>
    <text x="145" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">by task_id</text>

    <rect x="245" y="352" width="170" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="330" y="372" text-anchor="middle">vector_list</text>
    <text x="330" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">top 50 by priority</text>

    <rect x="430" y="352" width="170" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="515" y="372" text-anchor="middle">vector_logs</text>
    <text x="515" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">1-200 lines</text>

    <rect x="615" y="352" width="170" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="700" y="372" text-anchor="middle">vector_queue_depth</text>
    <text x="700" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">pending count</text>

    <rect x="800" y="352" width="170" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="885" y="372" text-anchor="middle">vector_projects</text>
    <text x="885" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">distinct project list</text>

    <rect x="985" y="352" width="135" height="46" rx="8" fill="#221a3d" stroke="#5b4b9b" stroke-width="1"/>
    <text x="1052" y="372" text-anchor="middle">vector_history</text>
    <text x="1052" y="388" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">last N days</text>
  </g>

  <rect x="60" y="416" width="1060" height="46" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="444" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">every `project` argument passes validate_project_name (^[a-zA-Z0-9][a-zA-Z0-9_-]{0,63}$) before touching SQL — shell commands are never used</text>
</svg>
