<svg width="1280" height="520" viewBox="0 0 1280 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgLx" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowLx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowLx" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="520" fill="url(#bgLx)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">CLAWHUB · AICPB · CLAWMART · WEB</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">LUMINA_EXT · 6 TOOLS</text>

  <rect x="120" y="112" width="1040" height="66" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowLx)"/>
  <text x="640" y="140" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">clawhub_search · clawhub_skill_detail · aicpb_rankings · clawmart_browse · claw_awesome_list · web_fetch</text>
  <text x="640" y="160" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">no auth — anonymous GET to a fixed target; web_fetch takes any caller-supplied URL</text>

  <line x1="640" y1="178" x2="640" y2="212" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowLx)" opacity="0.85"/>

  <rect x="150" y="218" width="440" height="90" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="370" y="244" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">success path</text>
  <text x="370" y="266" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">extract_readable_text() → strip script/style</text>
  <text x="370" y="284" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">tags → lines, decode minimal entities, truncate</text>
  <text x="370" y="300" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">title + body concatenated, NOT deduped</text>

  <rect x="690" y="218" width="440" height="90" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.4"/>
  <text x="910" y="244" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">failure path</text>
  <text x="910" y="266" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">never raises — folds into isError:false JSON</text>
  <text x="910" y="284" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">{"error": "HTTP 404: ..."}  body cut at 500 chars</text>
  <text x="910" y="300" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">matches legacy Python exactly</text>

  <rect x="150" y="330" width="980" height="66" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1.6"/>
  <circle cx="174" cy="356" r="6" fill="#f45d5d"/>
  <text x="640" y="360" text-anchor="middle" fill="#f0c4c4" font-size="13" font-weight="700">SSRF — lumina_web_fetch has no host/scheme/loopback guard</text>
  <text x="640" y="380" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">verified: http://127.0.0.1:22 was fetched — known gap, intentionally not fixed in this port</text>

  <rect x="150" y="410" width="980" height="80" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="436" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">Documented upstream quirks kept as-is: clawhub_skill_detail always 404s,</text>
  <text x="640" y="454" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">clawmart_browse search 404s (empty query works), aicpb_rankings ignores category</text>
  <text x="640" y="476" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">faithful 1:1 port of observed live behavior — not a redesign</text>
</svg>
