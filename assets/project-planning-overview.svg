<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgpp" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowPP" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowPP" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bgpp)"/>

  <text x="640" y="48" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">PROJECT &amp; PLANNING · 7 MODULES</text>
  <text x="640" y="84" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">WORK TRACKING · MESSAGING · SCHEDULING</text>
  <line x1="440" y1="102" x2="840" y2="102" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- plane, the largest module, centered top -->
  <rect x="470" y="126" width="340" height="66" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowPP)"/>
  <circle cx="500" cy="152" r="5" fill="#4a6cf6"/>
  <text x="516" y="157" fill="#e8e3f7" font-size="15" font-weight="700">plane · ~37 tools</text>
  <text x="500" y="178" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">full Plane CE work-management surface — see plane/README.md</text>

  <line x1="640" y1="192" x2="640" y2="222" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowPP)" opacity="0.7"/>

  <text x="150" y="240" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">POSTGRES-BACKED QUEUES &amp; INBOXES</text>

  <!-- row: axon, vector, nexus, reminder -->
  <g font-size="12.5" font-weight="600">
    <g>
      <rect x="150" y="254" width="255" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="172" cy="278" r="5" fill="#8b5cf6"/><text x="186" y="282" fill="#e8e3f7">axon · 4 tools</text>
      <text x="170" y="304" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">work-order / task queue</text>
      <text x="170" y="320" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">DATABASE_URL · axon_tasks</text>
    </g>
    <g>
      <rect x="415" y="254" width="255" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="437" cy="278" r="5" fill="#8b5cf6"/><text x="451" y="282" fill="#e8e3f7">vector · 11 tools</text>
      <text x="435" y="304" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">autonomous dev-loop queue</text>
      <text x="435" y="320" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">VECTOR_DATABASE_URL</text>
    </g>
    <g>
      <rect x="680" y="254" width="255" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="702" cy="278" r="5" fill="#4a6cf6"/><text x="716" y="282" fill="#e8e3f7">nexus · 5 tools</text>
      <text x="700" y="304" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">inter-agent inbox</text>
      <text x="700" y="320" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">DATABASE_URL · inbox_messages</text>
    </g>
    <g>
      <rect x="945" y="254" width="185" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="967" cy="278" r="5" fill="#4a6cf6"/><text x="981" y="282" fill="#e8e3f7">reminder · 4</text>
      <text x="965" y="304" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">one-shot alerts</text>
      <text x="965" y="320" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">DATABASE_URL · reminders</text>
    </g>
  </g>

  <text x="150" y="378" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">SSH-BACKED · REMOTE-HOST TOOLS</text>
  <g font-size="12.5" font-weight="600">
    <g>
      <rect x="150" y="392" width="390" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="172" cy="416" r="5" fill="#10b981"/><text x="186" y="420" fill="#e8e3f7">routines · 7 tools</text>
      <text x="170" y="442" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">scheduler control · propose/approve staging</text>
      <text x="170" y="458" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">ROUTINES_SSH_HOST · gated mutations</text>
    </g>
    <g>
      <rect x="560" y="392" width="390" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="582" cy="416" r="5" fill="#10b981"/><text x="596" y="420" fill="#e8e3f7">skills · 3 tools</text>
      <text x="580" y="442" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">SKILL.md filesystem CRUD (active/proposed)</text>
      <text x="580" y="458" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">SKILLS_SSH_HOST · kebab-case allowlist</text>
    </g>
  </g>

  <!-- governance band -->
  <rect x="150" y="512" width="980" height="66" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="538" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">GOVERNANCE · parameterized SQL only · identifier allowlists before any SSH/shell command</text>
  <text x="640" y="558" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">routines_approve / routines_edit / routines_batch_edit_notify_channel run through crate::approval::gate</text>

  <text x="640" y="612" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">Work tracking, task/dev-loop queues, agent messaging, and scheduled reminders — the non-Plane half of project-planning.</text>
</svg>
