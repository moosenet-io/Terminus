<svg width="1280" height="700" viewBox="0 0 1280 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgCd" cx="50%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowCd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowCd" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="700" fill="url(#bgCd)"/>

  <text x="640" y="50" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">CLIENT DEPLOYMENT</text>
  <text x="640" y="86" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">MCP CLIENT → DAEMON → mTLS → PRIMARY</text>
  <line x1="420" y1="104" x2="860" y2="104" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- MCP client -->
  <rect x="60" y="160" width="230" height="90" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowCd)"/>
  <text x="175" y="192" text-anchor="middle" fill="#e8e3f7" font-size="14.5" font-weight="600">Your MCP client</text>
  <text x="175" y="212" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">IDE / agent</text>
  <text x="175" y="228" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">http://127.0.0.1:$PORT/mcp</text>

  <line x1="290" y1="205" x2="360" y2="205" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowCd)"/>

  <!-- daemon -->
  <rect x="360" y="140" width="290" height="130" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowCd)"/>
  <text x="505" y="168" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">TERMINUS-CLIENT-DAEMON</text>
  <text x="505" y="190" text-anchor="middle" fill="#e8e3f7" font-size="12" font-family="'Courier New',monospace">127.0.0.1:$TERMINUS_CLIENT_LOCAL_PORT</text>
  <text x="505" y="210" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">plain MCP in (loopback only)</text>
  <text x="505" y="228" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">enroll() on startup, re-dial per request</text>
  <text x="505" y="246" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">GET /healthz</text>

  <line x1="650" y1="205" x2="730" y2="205" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowCd)"/>
  <text x="690" y="190" text-anchor="middle" fill="#9fb4ff" font-size="11" font-weight="600">mTLS</text>

  <!-- primary -->
  <rect x="730" y="130" width="280" height="150" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowCd)"/>
  <text x="870" y="158" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">TERMINUS PRIMARY</text>
  <circle cx="758" cy="184" r="4" fill="#8b5cf6"/><text x="770" y="188" fill="#e8e3f7" font-size="12" font-weight="600">/enroll</text>
  <text x="770" y="204" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">shared secret → cert + JWT</text>
  <circle cx="758" cy="224" r="4" fill="#4a6cf6"/><text x="770" y="228" fill="#e8e3f7" font-size="12" font-weight="600">mTLS listener</text>
  <text x="770" y="244" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">client-cert required, full catalog</text>
  <text x="870" y="266" text-anchor="middle" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">tools/list · tools/call round-trip</text>

  <!-- enroll flow below -->
  <rect x="60" y="340" width="1160" height="150" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="120" y="368" fill="#cbc4e6" font-size="13" font-weight="700">ENROLLMENT (first run, or on expiry)</text>

  <g font-family="'Courier New',monospace" font-size="11" fill="#a89fc8">
    <text x="120" y="396">1. daemon reads $TERMINUS_CLIENT_IDENTITY + $TERMINUS_ENROLLMENT_SHARED_SECRET from its process env</text>
    <text x="120" y="418">2. POST $TERMINUS_PRIMARY_URL/enroll {identity, shared_secret}  →  cert_pem + key_pem + ca_cert_pem + jwt + expires_at</text>
    <text x="120" y="440">3. persisted at ~/.terminus-client/credentials/&lt;identity&gt;.json, 0600 — reused until inside the renewal margin of expiry</text>
    <text x="120" y="462">4. connect() trusts ONLY the pinned ca_cert_pem (never the system trust store), dials TERMINUS_MTLS_HOST:TERMINUS_MTLS_PORT</text>
  </g>

  <text x="640" y="620" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">A local, plain MCP surface on loopback — every byte leaving the host is mTLS.</text>
</svg>
