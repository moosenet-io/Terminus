<svg width="1280" height="440" viewBox="0 0 1280 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#10b981"/></marker>
  </defs>

  <rect width="1280" height="440" fill="url(#bg2)"/>

  <text x="640" y="44" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">FLEET-HOST BRIDGE</text>
  <text x="640" y="76" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">TYPED SSH2 · NO SHELL=TRUE</text>
  <line x1="480" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="130" width="230" height="76" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="175" y="158" text-anchor="middle" fill="#e8e3f7" font-size="13.5" font-weight="600">Tool::execute(args)</text>
  <text x="175" y="178" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">validate against allowlist /</text>
  <text x="175" y="194" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">enum before any command built</text>

  <line x1="290" y1="168" x2="355" y2="168" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="355" y="130" width="230" height="76" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.2"/>
  <text x="470" y="158" text-anchor="middle" fill="#e8e3f7" font-size="13.5" font-weight="600">spawn_blocking(ssh_exec)</text>
  <text x="470" y="178" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">ssh2::Session · pubkey auth</text>
  <text x="470" y="194" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">fixed-template command string</text>

  <line x1="585" y1="168" x2="650" y2="168" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="650" y="120" width="230" height="96" rx="10" fill="#1d1736" stroke="#5b4b9b" stroke-width="1"/>
  <text x="765" y="148" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">Fleet host</text>
  <text x="763" y="170" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">*_SSH_HOST : 22</text>
  <text x="763" y="188" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">remote script / journalctl /</text>
  <text x="763" y="204" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">systemctl / status generator</text>

  <line x1="765" y1="216" x2="765" y2="256" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="600" y="258" width="330" height="60" rx="10" fill="#241c42" stroke="#4a6cf6" stroke-width="1.2"/>
  <text x="765" y="288" text-anchor="middle" fill="#e8e3f7" font-size="12.5" font-weight="600">stdout/stderr read back, trimmed</text>

  <line x1="600" y1="288" x2="480" y2="288" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrowGreen)"/>

  <rect x="150" y="258" width="330" height="60" rx="10" fill="#132a22" stroke="#10b981" stroke-width="1.2"/>
  <text x="315" y="288" text-anchor="middle" fill="#e8e3f7" font-size="12.5" font-weight="600">JSON result / Gitea write-back</text>

  <!-- optional gitea leg -->
  <line x1="315" y1="318" x2="315" y2="356" stroke="#8b5cf6" stroke-width="1.4" marker-end="url(#arrow)" opacity="0.85"/>
  <rect x="130" y="358" width="370" height="46" rx="10" fill="#241c42" stroke="#8b5cf6" stroke-width="1"/>
  <text x="315" y="386" text-anchor="middle" fill="#c9b8ff" font-size="11.5" font-family="'Courier New',monospace">vigil_status / sentinel_status read via GiteaClient — no extra SSH hop</text>

  <rect x="640" y="358" width="450" height="46" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="865" y="386" text-anchor="middle" fill="#cbc4e6" font-size="11.5" font-family="'Courier New',monospace">Connection failures genericized: never leak host/IP/port/"ssh" in error text</text>
</svg>
