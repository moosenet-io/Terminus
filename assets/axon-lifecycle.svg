<svg width="1180" height="460" viewBox="0 0 1180 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgax" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowAx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowAx" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1180" height="460" fill="url(#bgax)"/>
  <text x="590" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">AXON · TASK LIFECYCLE</text>
  <text x="590" y="78" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">axon_tasks · Postgres-backed work orders</text>
  <line x1="410" y1="94" x2="770" y2="94" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- submit -->
  <rect x="60" y="130" width="220" height="66" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowAx)"/>
  <text x="170" y="158" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">axon_submit</text>
  <text x="170" y="178" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">INSERT ... status='pending'</text>

  <line x1="280" y1="163" x2="360" y2="163" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowAx)"/>

  <!-- pending state -->
  <rect x="360" y="130" width="200" height="66" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="460" y="158" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">status=pending</text>
  <text x="460" y="178" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">ordered by priority, created_at</text>

  <line x1="560" y1="163" x2="640" y2="163" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowAx)"/>

  <!-- cancel -->
  <rect x="640" y="130" width="230" height="66" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowAx)"/>
  <text x="755" y="152" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">axon_cancel</text>
  <text x="755" y="170" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">UPDATE ... WHERE id=$1 AND</text>
  <text x="755" y="184" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">assignee=$2 AND status='pending'</text>

  <line x1="870" y1="163" x2="950" y2="163" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowAx)"/>
  <rect x="950" y="130" width="170" height="66" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="1035" y="158" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">cancelled</text>
  <text x="1035" y="178" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">0 rows ⇒ NotFound</text>

  <!-- status / list side reads -->
  <line x1="460" y1="196" x2="460" y2="250" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowAx)" opacity="0.85"/>
  <rect x="330" y="250" width="260" height="66" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="460" y="278" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">axon_status(task_id)</text>
  <text x="460" y="296" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">SELECT ... WHERE id=$1</text>

  <line x1="700" y1="196" x2="700" y2="250" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowAx)" opacity="0.85"/>
  <rect x="620" y="250" width="260" height="66" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="750" y="278" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">axon_list(user_id)</text>
  <text x="750" y="296" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">WHERE assignee=$1 AND pending</text>

  <!-- governance band -->
  <rect x="60" y="350" width="1060" height="64" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="376" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">ACCESS CONTROL IS SQL-ENFORCED — WHERE binds both task_id AND assignee</text>
  <text x="590" y="396" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">a caller can only cancel a task assigned to their own user_id · zero rows affected ⇒ ToolError::NotFound</text>

  <text x="590" y="440" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">4 tools · env: DATABASE_URL · every query is sqlx parameterized binding, zero string interpolation</text>
</svg>
