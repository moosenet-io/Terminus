<svg width="1280" height="900" viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgSrv" cx="50%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowSrv" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowSrv" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="900" fill="url(#bgSrv)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">MINT · SERVING-PROFILE AXIS</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">RUNNER · PROBES · SCHEMA</text>
  <line x1="480" y1="100" x2="800" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== SEED (top) ===== -->
  <rect x="470" y="122" width="340" height="54" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowSrv)"/>
  <text x="640" y="145" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">serving_seed.json (v2 master table)</text>
  <text x="640" y="163" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">SeedCell per (model_id × backend_tag)</text>
  <line x1="640" y1="176" x2="640" y2="206" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSrv)" opacity="0.85"/>

  <!-- ===== RUNNER CORE ===== -->
  <rect x="230" y="210" width="820" height="118" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" opacity="0.97"/>
  <text x="255" y="236" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">RUNNER (SRV-02) · run_with()</text>
  <circle cx="640" cy="230" r="5" fill="#c9b8ff"/>
  <g fill="#a89fc8" font-size="11" font-weight="400" font-family="'Courier New',monospace">
    <text x="255" y="262">for each seeded cell, in TIER ORDER llama-gpu → ollama-gpu → cpu:</text>
    <text x="255" y="282">resume-check (checkpoint) → VRAM-release gate → launch_and_measure() → classify()</text>
    <text x="255" y="302">→ profile_for() → INCREMENTAL persist (row THEN checkpoint mark) → drift_for(seed)</text>
  </g>
  <text x="255" y="320" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">one model resident in VRAM at a time · fail-safe on gate violation (skip, never double-load)</text>

  <line x1="360" y1="328" x2="360" y2="362" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSrv)" opacity="0.85"/>
  <line x1="920" y1="328" x2="920" y2="362" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSrv)" opacity="0.85"/>

  <!-- ===== PROBES layer (CellRequest -> Launcher trait -> CellOutcome) ===== -->
  <text x="175" y="358" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">PROBES (SRV-02) · ONE CELL = ONE (MODEL × BACKEND × RUNTIME)</text>

  <rect x="150" y="368" width="300" height="94" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="172" cy="392" r="5" fill="#8b5cf6"/><text x="186" y="396" fill="#e8e3f7" font-size="13" font-weight="600">CellRequest</text>
  <text x="170" y="416" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">model_id · backend · runtime</text>
  <text x="170" y="432" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">mmap_flag · gfx_override · cpu_lib</text>
  <text x="170" y="448" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">flash_attn · load_bound_s</text>

  <rect x="490" y="368" width="300" height="94" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.4"/>
  <circle cx="512" cy="392" r="5" fill="#4a6cf6"/><text x="526" y="396" fill="#e8e3f7" font-size="13" font-weight="600">Launcher (trait)</text>
  <text x="510" y="416" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">launch_and_measure(req)</text>
  <text x="510" y="432" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">drives standard prompt "sweep-standard-v2"</text>
  <text x="510" y="448" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">live impl spawns runtime · test mock scripts it</text>

  <rect x="830" y="368" width="300" height="94" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="852" cy="392" r="5" fill="#10b981"/><text x="866" y="396" fill="#e8e3f7" font-size="13" font-weight="600">VramGate (trait)</text>
  <text x="850" y="416" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">vram_in_use_bytes()</text>
  <text x="850" y="432" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">must return to baseline (+256MB tol.)</text>
  <text x="850" y="448" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">before the NEXT cell may launch</text>

  <line x1="300" y1="462" x2="300" y2="492" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowSrv)" opacity="0.8"/>
  <line x1="640" y1="462" x2="640" y2="492" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowSrv)" opacity="0.8"/>

  <!-- ===== CellOutcome variants row ===== -->
  <text x="175" y="488" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">CellOutcome · classify() → Verdict</text>

  <g font-size="10.5" font-weight="600" font-family="'Courier New',monospace">
    <rect x="150" y="498" width="152" height="52" rx="8" fill="#1a3a2e" stroke="#10b981" stroke-width="1"/>
    <text x="226" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">Served</text>
    <text x="226" y="536" text-anchor="middle" fill="#8fd9bb">tok_s · peak_gb · cold_load_s</text>

    <rect x="312" y="498" width="152" height="52" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <text x="388" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">UnknownArch</text>
    <text x="388" y="536" text-anchor="middle" fill="#a89fc8">permanent-unknown-arch</text>

    <rect x="474" y="498" width="152" height="52" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <text x="550" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">BuildIncompatible</text>
    <text x="550" y="536" text-anchor="middle" fill="#a89fc8">build-conditional (+bump)</text>

    <rect x="636" y="498" width="152" height="52" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <text x="712" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">QuantUnsupported</text>
    <text x="712" y="536" text-anchor="middle" fill="#a89fc8">quant-unsupported</text>

    <rect x="798" y="498" width="152" height="52" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <text x="874" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">OomHostRam / OomVram</text>
    <text x="874" y="536" text-anchor="middle" fill="#a89fc8">oom-host-ram · oom-vram</text>

    <rect x="960" y="498" width="170" height="52" rx="8" fill="#2a2440" stroke="#c9b8ff" stroke-width="1"/>
    <text x="1045" y="518" text-anchor="middle" fill="#e8e3f7" font-family="Helvetica" font-weight="600" font-size="11.5">SlowLoadExceedsBound</text>
    <text x="1045" y="536" text-anchor="middle" fill="#c9b8ff">NOT excluded · keep-warm note</text>
  </g>
  <rect x="150" y="558" width="300" height="34" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="300" y="579" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace" font-weight="600">AcquisitionGap → no fabricated verdict, row skipped</text>

  <line x1="640" y1="592" x2="640" y2="624" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSrv)" opacity="0.85"/>

  <!-- ===== SCHEMA / PERSISTENCE ===== -->
  <rect x="230" y="628" width="820" height="112" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" opacity="0.97"/>
  <text x="255" y="654" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">SCHEMA (SRV-01) · serving_profile TABLE</text>
  <circle cx="640" cy="648" r="5" fill="#c9b8ff"/>
  <g fill="#a89fc8" font-size="10.8" font-weight="400" font-family="'Courier New',monospace">
    <text x="255" y="678">UNIQUE (model_id, backend_tag) · UPSERT on conflict · best_runtime · env_json (JSONB)</text>
    <text x="255" y="696">tok_s · vram_or_ram_peak_gb · cold_load_s · keep_warm · fallback_runtime</text>
    <text x="255" y="714">exclusion_reason · recheck_trigger (CHECK: coherent pairing) · provenance</text>
  </g>
  <text x="255" y="732" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">feeds model_full_profile view (LEFT JOIN builder + assistant + serving, keyed on model_id)</text>

  <!-- ===== consumers row ===== -->
  <line x1="500" y1="740" x2="440" y2="772" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowSrv)" opacity="0.8"/>
  <line x1="780" y1="740" x2="840" y2="772" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowSrv)" opacity="0.8"/>

  <rect x="230" y="776" width="300" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="252" cy="800" r="5" fill="#4a6cf6"/><text x="266" y="804" fill="#e8e3f7" font-size="12.5" font-weight="600">serving_profile_get / _status</text>
  <text x="250" y="822" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">Terminus MCP tools (SRV-07) — read, sanitized</text>

  <rect x="750" y="776" width="300" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="772" cy="800" r="5" fill="#10b981"/><text x="786" y="804" fill="#e8e3f7" font-size="12.5" font-weight="600">Chord routing / residency</text>
  <text x="770" y="822" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">separate repo — reads env_json to replay launch</text>

  <!-- footer -->
  <rect x="150" y="850" width="980" height="34" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="872" text-anchor="middle" fill="#cbc4e6" font-size="11.5" font-weight="600">SRV-03 recheck (build-conditional only) is a SEPARATE, operator-invoked entry point — no background trigger</text>
</svg>
