<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgOdy" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowOdy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowOdy" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="560" fill="url(#bgOdy)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">TRAVEL DOMAIN</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">ODYSSEY · 8 TOOLS</text>

  <!-- caller -->
  <rect x="500" y="110" width="280" height="52" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowOdy)"/>
  <text x="640" y="141" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">MCP caller (Lumina)</text>

  <line x1="480" y1="162" x2="300" y2="210" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowOdy)" opacity="0.85"/>
  <line x1="800" y1="162" x2="980" y2="210" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowOdy)" opacity="0.85"/>

  <!-- CRUD group -->
  <rect x="120" y="216" width="480" height="150" rx="14" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.4"/>
  <text x="145" y="244" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">CRUD · SYNCHRONOUS</text>
  <g font-family="'Courier New',monospace" font-size="11" fill="#a89fc8">
    <text x="145" y="270">odyssey_bucket_add / _list</text>
    <text x="145" y="288">odyssey_update_points / _list_cards</text>
    <text x="145" y="306">odyssey_log_trip · odyssey_deals</text>
  </g>
  <circle cx="145" cy="332" r="5" fill="#4a6cf6"/>
  <text x="160" y="336" fill="#e8e3f7" font-size="11.5">ODYSSEY_API_URL (assumed REST facade)</text>
  <text x="145" y="354" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">reqwest · 30s client timeout</text>

  <!-- async group -->
  <rect x="680" y="216" width="480" height="150" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="705" y="244" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">ASYNC · BOUNDED SYNC HTTP</text>
  <g font-family="'Courier New',monospace" font-size="11" fill="#a89fc8">
    <text x="705" y="270">odyssey_research → Seer</text>
    <text x="705" y="288">odyssey_optimize → Wizard council</text>
  </g>
  <circle cx="705" cy="314" r="5" fill="#8b5cf6"/>
  <text x="720" y="318" fill="#e8e3f7" font-size="11.5">SEER_API_URL · 300s timeout</text>
  <circle cx="705" cy="336" r="5" fill="#8b5cf6"/>
  <text x="720" y="340" fill="#e8e3f7" font-size="11.5">CHORD_PROXY_URL · 90s timeout</text>
  <text x="705" y="358" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">tokio::time::timeout — never hangs the MCP server</text>

  <!-- targets -->
  <rect x="150" y="400" width="420" height="66" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="172" cy="424" r="5" fill="#10b981"/><text x="186" y="428" fill="#e8e3f7" font-size="13" font-weight="600">Engram (assumed facade)</text>
  <text x="170" y="450" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">bucket · points · cards · trips · deals</text>

  <rect x="710" y="400" width="420" height="66" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="732" cy="424" r="5" fill="#4a6cf6"/><text x="746" y="428" fill="#e8e3f7" font-size="13" font-weight="600">Seer research · Wizard / Chord proxy</text>
  <text x="730" y="450" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">POST /api/research · POST /v1/tools/call</text>

  <line x1="360" y1="366" x2="360" y2="400" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowOdy)" opacity="0.85"/>
  <line x1="920" y1="366" x2="920" y2="400" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowOdy)" opacity="0.85"/>

  <rect x="150" y="486" width="980" height="50" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="513" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">No CRUD backend is verified live — endpoint shapes are this port's design, flagged for operator audit</text>
</svg>
