<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#e85c5c"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg2)"/>

  <text x="640" y="48" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">TERMINUS-PRIMARY</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">GATEWAY REQUEST PIPELINE</text>
  <line x1="480" y1="100" x2="800" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- Caller -->
  <rect x="60" y="140" width="200" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
  <text x="160" y="166" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">Caller</text>
  <text x="160" y="184" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">mTLS client cert</text>

  <line x1="260" y1="170" x2="330" y2="170" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 1: Identity -->
  <rect x="330" y="140" width="200" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="352" cy="164" r="5" fill="#8b5cf6"/>
  <text x="366" y="168" fill="#e8e3f7" font-size="13" font-weight="600">1 · Identity</text>
  <text x="350" y="186" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">ClientIdentity ext.</text>

  <line x1="530" y1="170" x2="600" y2="170" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 2: Allowlist -->
  <rect x="600" y="140" width="200" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="622" cy="164" r="5" fill="#4a6cf6"/>
  <text x="636" y="168" fill="#e8e3f7" font-size="13" font-weight="600">2 · Allowlist</text>
  <text x="620" y="186" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">default-deny/identity</text>

  <line x1="800" y1="170" x2="870" y2="170" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 3: Rate limit -->
  <rect x="870" y="140" width="200" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="892" cy="164" r="5" fill="#4a6cf6"/>
  <text x="906" y="168" fill="#e8e3f7" font-size="13" font-weight="600">3 · Rate limit</text>
  <text x="890" y="186" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">token bucket/key</text>

  <!-- Denial branch -->
  <line x1="430" y1="200" x2="430" y2="260" stroke="#e85c5c" stroke-width="1.4" marker-end="url(#arrowRed)" opacity="0.85"/>
  <line x1="700" y1="200" x2="700" y2="260" stroke="#e85c5c" stroke-width="1.4" marker-end="url(#arrowRed)" opacity="0.85"/>
  <line x1="970" y1="200" x2="970" y2="260" stroke="#e85c5c" stroke-width="1.4" marker-end="url(#arrowRed)" opacity="0.85"/>
  <rect x="330" y="262" width="740" height="46" rx="10" fill="#2b1c22" stroke="#e85c5c" stroke-width="1"/>
  <text x="700" y="290" text-anchor="middle" fill="#f0b8b8" font-size="12" font-family="'Courier New',monospace">403 (no identity / not allowlisted) or 429 (rate limited) — audited as DeniedNoIdentity / DeniedNotAllowlisted / DeniedRateLimited, never dispatched</text>

  <!-- Dispatch fork -->
  <line x1="970" y1="170" x2="1040" y2="170" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="1040" y="140" width="180" height="60" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="1130" y="164" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">4 · Dispatch</text>
  <text x="1130" y="184" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">caller's own logic</text>

  <line x1="1130" y1="200" x2="1130" y2="240" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Two dispatch targets -->
  <rect x="900" y="360" width="220" height="80" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4" filter="url(#cardShadow)"/>
  <text x="1010" y="386" text-anchor="middle" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">TOOL CALL</text>
  <text x="1010" y="406" text-anchor="middle" fill="#e8e3f7" font-size="12">core: local registry</text>
  <text x="1010" y="424" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">register_all()</text>

  <rect x="1130" y="360" width="220" height="80" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4" filter="url(#cardShadow)" transform="translate(-120,0)"/>

  <rect x="640" y="360" width="220" height="80" rx="12" fill="#1d1736" stroke="#10b981" stroke-width="1.4" filter="url(#cardShadow)"/>
  <text x="750" y="386" text-anchor="middle" fill="#7fe0b8" font-size="12" letter-spacing="2" font-weight="600">TOOL CALL (personal)</text>
  <text x="750" y="406" text-anchor="middle" fill="#e8e3f7" font-size="12">federated → Chord relay</text>
  <text x="750" y="424" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">/v1/personal/tools/call</text>

  <rect x="380" y="360" width="220" height="80" rx="12" fill="#1d1736" stroke="#4a6cf6" stroke-width="1.4" filter="url(#cardShadow)"/>
  <text x="490" y="386" text-anchor="middle" fill="#9fb4ff" font-size="12" letter-spacing="2" font-weight="600">INFERENCE PROXY</text>
  <text x="490" y="406" text-anchor="middle" fill="#e8e3f7" font-size="12">forwarded to Chord</text>
  <text x="490" y="424" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">/v1/chat/completions …</text>

  <line x1="1010" y1="360" x2="1090" y2="200" stroke="#7c5cff" stroke-width="1.2" opacity="0.5"/>
  <line x1="750" y1="360" x2="1120" y2="200" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
  <line x1="490" y1="360" x2="1140" y2="200" stroke="#4a6cf6" stroke-width="1.2" opacity="0.5"/>

  <!-- Stage 5: audit -->
  <line x1="750" y1="440" x2="750" y2="490" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1010" y1="440" x2="850" y2="490" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="490" y1="440" x2="650" y2="490" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="330" y="492" width="620" height="70" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="518" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">5 · Audit — GatewayContext::record_result()</text>
  <text x="640" y="538" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">S6-sanitized: identity, action, kind (tool/inference), result, detail — one entry per request</text>

  <text x="640" y="620" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">ONE SHARED PIPELINE — GatewayFramework::guard()</text>
  <text x="640" y="642" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">identical for tool-call dispatch AND inference-proxy routes; only the audited ActionKind differs</text>

  <rect x="150" y="668" width="980" height="56" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="692" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">Fail-closed always: identity: None never clears the gate — denied + audited before allowlist/rate-limit ever run</text>
  <text x="640" y="710" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">src/gateway_framework/mod.rs — GatewayFramework::guard()</text>
</svg>
