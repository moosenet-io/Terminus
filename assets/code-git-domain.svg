<svg width="1180" height="620" viewBox="0 0 1180 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="cgbg" cx="50%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cgShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="cgArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1180" height="620" fill="url(#cgbg)"/>

  <text x="590" y="50" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">TERMINUS TOOL DOMAIN</text>
  <text x="590" y="88" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">CODE &amp; GIT</text>
  <line x1="420" y1="106" x2="760" y2="106" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>
  <text x="590" y="130" text-anchor="middle" fill="#a89fc8" font-size="12.5" font-family="'Courier New',monospace">7 modules · ~48 tools · source-control, dev-exec, code-intelligence &amp; docs</text>

  <!-- caller -->
  <rect x="450" y="152" width="280" height="50" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cgShadow)"/>
  <text x="590" y="173" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">MCP caller (agentic coding session)</text>
  <text x="590" y="191" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">Terminus registry · dispatch · governance</text>
  <line x1="590" y1="202" x2="590" y2="238" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#cgArrow)" opacity="0.85"/>

  <!-- lane labels -->
  <text x="200" y="262" fill="#a78bff" font-size="12" letter-spacing="3" font-weight="600">SOURCE CONTROL</text>
  <text x="620" y="262" fill="#a78bff" font-size="12" letter-spacing="3" font-weight="600">DEV EXECUTION</text>
  <text x="960" y="262" fill="#a78bff" font-size="12" letter-spacing="3" font-weight="600">INTEL &amp; DOCS</text>

  <!-- source control column -->
  <g font-size="13" font-weight="600">
    <rect x="60" y="276" width="330" height="66" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.2"/>
    <circle cx="84" cy="300" r="5" fill="#8b5cf6"/><text x="98" y="304" fill="#e8e3f7">gitea · 15</text>
    <text x="82" y="326" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">self-hosted repos/files/PRs/cargo · PII gate on write</text>

    <rect x="60" y="352" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="84" cy="376" r="5" fill="#10b981"/><text x="98" y="380" fill="#e8e3f7">github · 5</text>
    <text x="82" y="402" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">public mirror · mandatory PII pre-push gate</text>

    <rect x="60" y="428" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="84" cy="452" r="5" fill="#8b5cf6"/><text x="98" y="456" fill="#e8e3f7">forge · 4 + 4 mirror subtools</text>
    <text x="82" y="478" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">provider-agnostic private/public · posture-gated</text>
  </g>

  <!-- dev execution column -->
  <g font-size="13" font-weight="600">
    <rect x="420" y="276" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="444" cy="300" r="5" fill="#4a6cf6"/><text x="458" y="304" fill="#e8e3f7">dev · 6</text>
    <text x="442" y="326" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">path-jailed run/read/write over SSH · no cmd allowlist</text>

    <rect x="420" y="352" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="444" cy="376" r="5" fill="#8b5cf6"/><text x="458" y="380" fill="#e8e3f7">openhands · 3</text>
    <text x="442" y="402" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">agentic runtime over HTTP · approval-gated</text>
  </g>

  <!-- intel & docs column -->
  <g font-size="13" font-weight="600">
    <rect x="790" y="276" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="814" cy="300" r="5" fill="#4a6cf6"/><text x="828" y="304" fill="#e8e3f7">cortex · 10</text>
    <text x="812" y="326" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">code-graph / blast-radius / risk over SSH relay</text>

    <rect x="790" y="352" width="330" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="814" cy="376" r="5" fill="#10b981"/><text x="828" y="380" fill="#e8e3f7">scribe · 5</text>
    <text x="812" y="402" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">LLM docs agent · README/wiki/diary → git vault</text>
  </g>

  <!-- governance band -->
  <rect x="60" y="520" width="1060" height="60" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="546" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">GOVERNANCE · per-identity PATs · PII gate on every public/write path · path-jailed FS · approval gate on agentic exec</text>
  <text x="590" y="566" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">green = local/safe · violet = write/egress path · read-only by default</text>
</svg>
