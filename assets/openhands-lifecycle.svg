<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow3" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg3)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">CODE &amp; GIT · OPENHANDS</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">TASK LIFECYCLE · SUBMIT → POLL → COMPLETE</text>
  <line x1="440" y1="100" x2="840" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- Caller -->
  <rect x="70" y="130" width="200" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow3)"/>
  <text x="170" y="154" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">MCP caller</text>
  <text x="170" y="173" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">lumina-core / operator</text>

  <!-- Approval gate -->
  <rect x="330" y="130" width="230" height="56" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadow3)"/>
  <circle cx="352" cy="154" r="5" fill="#8b5cf6"/>
  <text x="366" y="154" fill="#e8e3f7" font-size="13.5" font-weight="600">approval::gate()</text>
  <text x="366" y="173" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">DATABASE_URL · tool_approvals</text>

  <!-- OpenHands API -->
  <rect x="620" y="130" width="260" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow3)"/>
  <circle cx="642" cy="154" r="5" fill="#4a6cf6"/>
  <text x="656" y="154" fill="#e8e3f7" font-size="13.5" font-weight="600">OpenHands API</text>
  <text x="656" y="173" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">OPENHANDS_URL</text>

  <line x1="270" y1="158" x2="322" y2="158" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow3)"/>
  <line x1="560" y1="158" x2="612" y2="158" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow3)"/>
  <text x="440" y="150" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">Granted only</text>

  <!-- Denied / Pending branch -->
  <rect x="330" y="204" width="230" height="46" rx="9" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="445" y="224" text-anchor="middle" fill="#cbc4e6" font-size="11.5" font-weight="600">Pending / Denied</text>
  <text x="445" y="240" text-anchor="middle" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">"APPROVAL REQUIRED" — no HTTP call made</text>
  <line x1="445" y1="186" x2="445" y2="204" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow3)" opacity="0.75"/>

  <!-- Step 1: run_task -->
  <rect x="120" y="290" width="330" height="96" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.5" filter="url(#cardShadow3)"/>
  <text x="145" y="316" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">1 · SUBMIT</text>
  <text x="145" y="338" fill="#e8e3f7" font-size="14" font-weight="600" font-family="'Courier New',monospace">openhands_run_task</text>
  <text x="145" y="356" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">POST /api/conversations</text>
  <text x="145" y="371" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">→ conversation_id, status: STARTING</text>

  <!-- Step 2: get_status (loop) -->
  <rect x="475" y="290" width="330" height="96" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.5" filter="url(#cardShadow3)"/>
  <text x="500" y="316" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">2 · POLL (repeat)</text>
  <text x="500" y="338" fill="#e8e3f7" font-size="14" font-weight="600" font-family="'Courier New',monospace">openhands_get_status</text>
  <text x="500" y="356" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">GET /api/conversations/:id[/events]</text>
  <text x="500" y="371" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">complete = (status == "STOPPED")</text>

  <!-- Step 3: complete -->
  <rect x="830" y="290" width="330" height="96" rx="12" fill="#1d1736" stroke="#10b981" stroke-width="1.5" filter="url(#cardShadow3)"/>
  <text x="855" y="316" fill="#6ee7b7" font-size="12.5" letter-spacing="2" font-weight="600">3 · COMPLETE</text>
  <text x="855" y="338" fill="#e8e3f7" font-size="14" font-weight="600">status: STOPPED</text>
  <text x="855" y="356" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">complete: true</text>
  <text x="855" y="371" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">last recent_events (optional)</text>

  <line x1="450" y1="338" x2="467" y2="338" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow3)"/>
  <line x1="805" y1="338" x2="822" y2="338" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow3)"/>
  <path d="M 700 386 C 700 420, 590 420, 590 386" fill="none" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow3)" opacity="0.75"/>
  <text x="647" y="436" text-anchor="middle" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">RUNNING/STARTING → poll again (each call re-gated)</text>

  <!-- list_conversations, side tool -->
  <rect x="120" y="470" width="1040" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="145" cy="497" r="5" fill="#4a6cf6"/>
  <text x="160" y="501" fill="#e8e3f7" font-size="13.5" font-weight="600" font-family="'Courier New',monospace">openhands_list_conversations</text>
  <text x="160" y="519" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">GET /api/conversations · limit N (default 10) · independent of any single task; also gated</text>

  <!-- distinction band: dev_trigger_openhands -->
  <rect x="120" y="570" width="1040" height="86" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="145" y="594" fill="#cbc4e6" font-size="12.5" font-weight="600">NOT the same code path as `dev_trigger_openhands` (code-git/dev module)</text>
  <text x="145" y="614" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">dev_trigger_openhands: SSHes into the dev host, curls OpenHands locally there (DEV_OPENHANDS_URL) — no approval::gate() call found in that handler.</text>
  <text x="145" y="632" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">openhands_run_task / _get_status / _list_conversations: call the OpenHands API directly over HTTP (OPENHANDS_URL) — every call is approval-gated.</text>

  <text x="640" y="700" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">Every call into this module is a guarded call — gate() runs before any HTTP request, every time.</text>
</svg>
