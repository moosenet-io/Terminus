<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgGate" cx="50%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowGate" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGate" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowGateDash" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#9b92c0"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bgGate)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">GITHUB MODULE</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">PII GATE · MANDATORY WRITE PATH</text>
  <line x1="430" y1="98" x2="850" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== Write tools (top row) ===== -->
  <g font-size="13.5" font-weight="600">
    <rect x="110" y="126" width="230" height="64" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowGate)"/>
    <text x="225" y="152" text-anchor="middle" fill="#e8e3f7">github_create_repo</text>
    <text x="225" y="171" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">name + description</text>

    <rect x="380" y="126" width="230" height="64" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowGate)"/>
    <text x="495" y="152" text-anchor="middle" fill="#e8e3f7">github_push_repo</text>
    <text x="495" y="171" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">gitea/github repo + owner</text>

    <rect x="650" y="126" width="230" height="64" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowGate)"/>
    <text x="765" y="152" text-anchor="middle" fill="#e8e3f7">github_push_branch</text>
    <text x="765" y="171" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">files + deletions + message</text>

    <rect x="940" y="126" width="230" height="64" rx="10" fill="#1d1736" stroke="#4a6cf6" stroke-width="1.2" stroke-dasharray="4 3" filter="url(#cardShadowGate)"/>
    <text x="1055" y="152" text-anchor="middle" fill="#e8e3f7">github_pii_scan</text>
    <text x="1055" y="171" text-anchor="middle" fill="#a9bdfa" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">read-only · same engine</text>
  </g>

  <line x1="225" y1="190" x2="500" y2="238" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowGate)" opacity="0.9"/>
  <line x1="495" y1="190" x2="560" y2="238" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowGate)" opacity="0.9"/>
  <line x1="765" y1="190" x2="660" y2="238" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowGate)" opacity="0.9"/>
  <line x1="1055" y1="190" x2="900" y2="238" stroke="#9b92c0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowGateDash)" opacity="0.85"/>

  <!-- ===== Gate box ===== -->
  <rect x="220" y="244" width="840" height="150" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.8"/>
  <text x="245" y="272" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">PII GATE · pii_gate() → ruleset_from_config(None).scan_content()</text>
  <circle cx="800" cy="266" r="5" fill="#c9b8ff"/>
  <g fill="#a89fc8" font-size="10.8" font-weight="400" font-family="'Courier New',monospace">
    <text x="245" y="298">built-in: private_ip · container_id · internal_hostname · internal_domain</text>
    <text x="245" y="316">email (allow-listed) · phone · api_key · internal_path · local_url</text>
    <text x="245" y="334">infra_service · uuid_secret (cue-scoped)</text>
    <text x="245" y="356">extension: jwt · ssh_key · aws_access_key · google_api_key ·</text>
    <text x="245" y="374">slack_user_token · generic_secret · config_term / config_pattern</text>
  </g>
  <text x="1035" y="374" text-anchor="end" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">no flag/env/arg disables this gate</text>

  <!-- ===== Split to outcomes ===== -->
  <line x1="450" y1="394" x2="330" y2="446" stroke="#f97373" stroke-width="1.8" marker-end="url(#arrowGate)"/>
  <line x1="830" y1="394" x2="950" y2="446" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrowGate)"/>

  <!-- BLOCKED -->
  <rect x="150" y="452" width="360" height="120" rx="12" fill="#241c42" stroke="#f97373" stroke-width="1.6" filter="url(#cardShadowGate)"/>
  <circle cx="180" cy="478" r="6" fill="#f97373"/>
  <text x="196" y="483" fill="#f3b0b0" font-size="15" font-weight="700">BLOCKED</text>
  <g fill="#c8bfe0" font-size="11.2" font-weight="400" font-family="'Courier New',monospace">
    <text x="172" y="506">Err(ToolError::InvalidArgument)</text>
    <text x="172" y="524">"BLOCKED: N PII pattern(s) detected"</text>
    <text x="172" y="542">line + category + redacted context</text>
    <text x="172" y="560">ZERO network requests fire</text>
  </g>

  <!-- ALLOWED -->
  <rect x="770" y="452" width="360" height="120" rx="12" fill="#241c42" stroke="#10b981" stroke-width="1.6" filter="url(#cardShadowGate)"/>
  <circle cx="800" cy="478" r="6" fill="#10b981"/>
  <text x="816" y="483" fill="#9bd8bc" font-size="15" font-weight="700">CLEAN → PROCEEDS</text>
  <g fill="#c8bfe0" font-size="11.2" font-weight="400" font-family="'Courier New',monospace">
    <text x="792" y="506">Ok(()) — scan ran BEFORE any call</text>
    <text x="792" y="524">create_repo → POST /orgs/&lt;org&gt;/repos</text>
    <text x="792" y="542">push_branch → blob → tree → commit → ref</text>
    <text x="792" y="560">push_repo → returns mirror cmd (no exec)</text>
  </g>

  <!-- fixture exemption note -->
  <rect x="150" y="592" width="980" height="46" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="620" text-anchor="middle" fill="#cbc4e6" font-size="11.6" font-family="'Courier New',monospace">the ONLY exemption: a line tagged // pii-test-fixture is cleared before scanning — line-exact, never a blanket bypass</text>

  <!-- governance band -->
  <rect x="150" y="656" width="980" height="58" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="682" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">GOVERNANCE · scan runs before every network call · redacted context only · audit log records pass/fail + count, never values</text>
  <text x="640" y="702" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">GITHUB_ALLOWED_AUTHORS: comma-separated email allow-list · the only configurable exception</text>

  <text x="640" y="742" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">Every GitHub write in Terminus is scanned before it can reach the network — no bypass path exists.</text>
</svg>
