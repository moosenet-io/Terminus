<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg2)"/>

  <text x="640" y="52" text-anchor="middle" fill="#b9b0d8" font-size="15" letter-spacing="7" font-weight="500">MCP TOOL HUB</text>
  <text x="640" y="92" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700" letter-spacing="3">TERMINUS · SYSTEM ARCHITECTURE</text>
  <line x1="470" y1="112" x2="810" y2="112" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== MCP CLIENTS (top) ===== -->
  <g>
    <rect x="360" y="142" width="240" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
    <text x="480" y="166" text-anchor="middle" fill="#e8e3f7" font-size="15" font-weight="600">Lumina · Harmony</text>
    <text x="480" y="185" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">MCP clients</text>
    <rect x="680" y="142" width="240" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadow)"/>
    <text x="800" y="166" text-anchor="middle" fill="#e8e3f7" font-size="15" font-weight="600">Transports</text>
    <text x="800" y="185" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">stdio (ssh) · HTTP</text>
  </g>
  <line x1="480" y1="198" x2="560" y2="240" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)" opacity="0.85"/>
  <line x1="800" y1="198" x2="720" y2="240" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow)" opacity="0.85"/>

  <!-- ===== TERMINUS CORE ===== -->
  <rect x="290" y="246" width="700" height="92" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" opacity="0.96"/>
  <text x="315" y="274" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">TERMINUS CORE · MCP SERVER</text>
  <circle cx="640" cy="268" r="5" fill="#c9b8ff"/>
  <g fill="#a89fc8" font-size="11.5" font-weight="400" font-family="'Courier New',monospace">
    <text x="315" y="312">tool registry · dispatch · schema · governance (path-jail · vault · PII gate · audit)</text>
  </g>

