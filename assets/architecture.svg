      <circle cx="916" cy="410" r="5" fill="#10b981"/><text x="930" y="414" fill="#e8e3f7">Review (local)</text>
      <text x="914" y="438" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">dgem_review</text>
      <text x="914" y="454" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">DiffusionGemma · $0</text>
