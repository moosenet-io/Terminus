      <text x="418" y="438" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">gitea · github · dev</text>
      <text x="418" y="454" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">code-server</text>
