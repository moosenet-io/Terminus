      <text x="418" y="526" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">caldav · email · matrix</text>
      <text x="418" y="542" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">reminders</text>
    </g>
    <g>
      <rect x="646" y="474" width="232" height="78" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="668" cy="498" r="5" fill="#8b5cf6"/><text x="682" y="502" fill="#e8e3f7">Secrets &amp; Network</text>
      <text x="666" y="526" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">infisical · network</text>
      <text x="666" y="542" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">vault-backed</text>
    </g>
    <g>
      <rect x="894" y="474" width="232" height="78" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="916" cy="498" r="5" fill="#4a6cf6"/><text x="930" y="502" fill="#e8e3f7">Media &amp; Project</text>
      <text x="914" y="526" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">jellyseerr · plane</text>
      <text x="914" y="542" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">weather · ...</text>
    </g>
