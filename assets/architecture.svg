  <!-- governance band -->
  <rect x="150" y="566" width="976" height="58" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="592" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">GOVERNANCE · path-jailed FS · vault-only secrets · mandatory PII gate · sanitized audit log</text>
  <text x="640" y="612" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">read-only by default · write scopes explicit · no raw std::env for secrets</text>

  <text x="640" y="668" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">One MCP surface for the whole stack — every tool governed, sandboxed, and auditable.</text>
</svg>
