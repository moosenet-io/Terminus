      <text x="666" y="438" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">searxng · engram</text>
      <text x="666" y="454" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">knowledge digest</text>
    </g>
    <g>
