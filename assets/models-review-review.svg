<svg width="1280" height="660" viewBox="0 0 1280 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgRv" cx="50%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowRv" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowRv" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1280" height="660" fill="url(#bgRv)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">src/review/</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">REVIEW_RUN · MULTI-PROVIDER FAN-OUT</text>
  <line x1="440" y1="98" x2="840" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- review_run box -->
  <rect x="440" y="118" width="400" height="60" rx="12" fill="#241c42" stroke="#7c5cff" stroke-width="1.8" filter="url(#cardShadowRv)"/>
  <text x="640" y="142" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">review_run</text>
  <text x="640" y="162" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">1-5 providers · tokio JoinSet · concurrent</text>

  <!-- 5 providers -->
  <g font-size="11.5" font-weight="700">
    <rect x="60" y="212" width="200" height="66" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
    <circle cx="82" cy="234" r="5" fill="#10b981"/><text x="96" y="239" fill="#e8e3f7">opus</text>
    <text x="80" y="260" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace" font-weight="400">review-daemon (loopback)</text>

    <rect x="280" y="212" width="200" height="66" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
    <circle cx="302" cy="234" r="5" fill="#10b981"/><text x="316" y="239" fill="#e8e3f7">codex</text>
    <text x="300" y="260" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace" font-weight="400">review-daemon (loopback)</text>

    <rect x="500" y="212" width="200" height="66" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
    <circle cx="522" cy="234" r="5" fill="#10b981"/><text x="536" y="239" fill="#e8e3f7">agy</text>
    <text x="520" y="260" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace" font-weight="400">review-daemon (loopback)</text>

    <rect x="720" y="212" width="230" height="66" rx="10" fill="#241c42" stroke="#4a6cf6" stroke-width="1.4"/>
    <circle cx="742" cy="234" r="5" fill="#4a6cf6"/><text x="756" y="239" fill="#e8e3f7">nemotron</text>
    <text x="740" y="260" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace" font-weight="400">OpenRouter · 550B free-tier</text>

    <rect x="970" y="212" width="230" height="66" rx="10" fill="#241c42" stroke="#4a6cf6" stroke-width="1.4"/>
    <circle cx="992" cy="234" r="5" fill="#4a6cf6"/><text x="1006" y="239" fill="#e8e3f7">qwen_coder</text>
    <text x="990" y="260" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace" font-weight="400">OpenRouter · 480B free-tier</text>
  </g>

  <path d="M560 178 C 400 195, 250 200, 160 212" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowRv)" opacity="0.75"/>
  <path d="M600 178 L380 212" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowRv)" opacity="0.75"/>
  <path d="M640 178 L600 212" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowRv)" opacity="0.75"/>
  <path d="M680 178 L835 212" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowRv)" opacity="0.75"/>
  <path d="M720 178 C 900 195, 1000 200, 1085 212" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowRv)" opacity="0.75"/>

  <!-- parse_verdict -->
  <rect x="340" y="308" width="600" height="56" rx="10" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="640" y="332" text-anchor="middle" fill="#cbc4e6" font-size="11.5" font-family="'Courier New',monospace">parse_verdict(): last "VERDICT:" token wins (ASCII-safe rfind)</text>
  <text x="640" y="350" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">a provider echoing the instructions earlier is never mistaken for its final answer</text>

  <path d="M400 278 L500 308" stroke="#7c5cff" stroke-width="1.2" marker-end="url(#arrowRv)" opacity="0.6"/>
  <path d="M840 278 L780 308" stroke="#7c5cff" stroke-width="1.2" marker-end="url(#arrowRv)" opacity="0.6"/>
  <path d="M1080 278 C 1000 300, 900 300, 840 308" stroke="#7c5cff" stroke-width="1.2" marker-end="url(#arrowRv)" opacity="0.6"/>

  <!-- 4 structures -->
  <rect x="150" y="392" width="980" height="140" rx="14" fill="#241c42" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowRv)"/>
  <text x="175" y="418" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">AGGREGATION — 4 STRUCTURES, ALWAYS FAIL-SAFE</text>
  <g font-size="11" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="175" y="444">single: mirrors the one provider  ·  panel_majority: strict &gt;50% of AVAILABLE; tie/no-majority → REQUEST_CHANGES</text>
    <text x="175" y="466">panel_unanimous: APPROVE only if ALL available approve  ·  adversarial_pair: attack REFUTED wins → REQUEST_CHANGES</text>
    <text x="175" y="488" fill="#9b92c0">A provider timeout/error degrades that slot to UNKNOWN — never fails the whole call. complete=false whenever any slot degraded.</text>
    <text x="175" y="510" fill="#9b92c0">Never silently coerced to APPROVE — ambiguous or incomplete input always resolves to the safer REQUEST_CHANGES/UNKNOWN verdict.</text>
  </g>

  <text x="640" y="610" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">review_run — one JSON call, up to 5 concurrent providers, one aggregated verdict.</text>
</svg>
