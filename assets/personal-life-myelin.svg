<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgMyelin" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowMy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowMy" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="400" fill="url(#bgMyelin)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">PERSONAL-LIFE · LLM COST (CHORD-10)</text>
  <text x="640" y="78" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">MYELIN — 9 TOOLS, PARAMETERIZED SQL</text>

  <rect x="60" y="140" width="220" height="70" rx="12" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowMy)"/>
  <text x="170" y="170" text-anchor="middle" fill="#e8e3f7" font-size="15" font-weight="600">MCP client</text>
  <text x="170" y="190" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">myelin_* call</text>

  <line x1="280" y1="175" x2="380" y2="175" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowMy)"/>

  <rect x="386" y="120" width="290" height="110" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="531" y="146" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2.5" font-weight="600">src/myelin/mod.rs</text>
  <circle cx="531" cy="168" r="5" fill="#8b5cf6"/>
  <text x="531" y="190" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">sqlx::query().bind()</text>
  <text x="531" y="210" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">pool() per call, max 3 conns</text>

  <line x1="676" y1="175" x2="776" y2="175" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowMy)"/>

  <rect x="782" y="120" width="260" height="110" rx="14" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowMy)"/>
  <text x="912" y="150" text-anchor="middle" fill="#e8e3f7" font-size="15" font-weight="600">Postgres</text>
  <text x="912" y="172" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">myelin_usage table</text>
  <circle cx="885" cy="196" r="5" fill="#10b981"/>
  <text x="898" y="200" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">MYELIN_DATABASE_URL</text>

  <line x1="912" y1="230" x2="912" y2="270" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowMy)"/>

  <rect x="782" y="276" width="260" height="70" rx="12" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowMy)"/>
  <text x="912" y="304" text-anchor="middle" fill="#e8e3f7" font-size="13.5" font-weight="600">fmt_cost() report</text>
  <text x="912" y="324" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">"$X.XX" plain-text lines</text>

  <text x="640" y="384" text-anchor="middle" fill="#564d75" font-size="11" letter-spacing="0.4">Replaces a legacy Python tool that built raw SQL inside shelled-out python -c commands.</text>
