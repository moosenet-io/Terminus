<svg width="1180" height="440" viewBox="0 0 1180 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgsk" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowSk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowSk" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1180" height="440" fill="url(#bgsk)"/>
  <text x="590" y="44" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">SKILLS · SKILL.MD FILESYSTEM CRUD OVER SSH</text>
  <text x="590" y="76" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="2">agentskills.io format · active/ vs proposed/</text>
  <line x1="380" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="130" width="260" height="76" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowSk)"/>
  <text x="190" y="156" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">skills_create</text>
  <text x="190" y="174" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">validate_skill_name (kebab-case)</text>
  <text x="190" y="190" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">mkdir -p · cat &gt; SKILL.md</text>

  <line x1="320" y1="168" x2="390" y2="168" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSk)"/>
  <g>
    <rect x="390" y="130" width="180" height="76" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
    <text x="480" y="156" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="700">proposed/</text>
    <text x="480" y="174" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">default (proposed=true)</text>
    <text x="480" y="190" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">SKILLS_PROPOSED_DIR</text>
  </g>
  <text x="480" y="222" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">proposed=false ↓</text>
  <line x1="480" y1="230" x2="480" y2="250" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowSk)"/>
  <rect x="390" y="250" width="180" height="60" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="480" y="276" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="700">active/</text>
  <text x="480" y="294" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">SKILLS_ACTIVE_DIR</text>

  <line x1="570" y1="168" x2="640" y2="168" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowSk)" opacity="0.85"/>
  <rect x="640" y="140" width="230" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="755" y="162" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">skills_list</text>
  <text x="755" y="180" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">reads active/ only, marker-split cat</text>

  <line x1="570" y1="280" x2="640" y2="280" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowSk)" opacity="0.85"/>
  <rect x="640" y="252" width="230" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="755" y="274" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">skills_read(name)</text>
  <text x="755" y="292" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">tries active/ then proposed/</text>

  <line x1="870" y1="220" x2="940" y2="220" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSk)"/>
  <rect x="940" y="180" width="180" height="80" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="1030" y="206" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="700">{name, status,</text>
  <text x="1030" y="222" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="700">meta, body, raw}</text>
  <text x="1030" y="242" text-anchor="middle" fill="#a89fc8" font-size="9.5" font-family="'Courier New',monospace">YAML frontmatter → JSON meta</text>

  <rect x="60" y="336" width="1060" height="60" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="360" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">skill_name must match ^[a-z0-9][a-z0-9-]*$ before it ever becomes a directory name in a remote command</text>
  <text x="590" y="380" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">env: SKILLS_SSH_HOST · SKILLS_SSH_USER · SKILLS_SSH_KEY_PATH · SKILLS_ACTIVE_DIR · SKILLS_PROPOSED_DIR (none default)</text>
</svg>
