<svg width="1280" height="900" viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgFM" cx="50%" cy="26%" r="88%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowFM" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowFM" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="900" fill="url(#bgFM)"/>

  <text x="640" y="48" text-anchor="middle" fill="#b9b0d8" font-size="15" letter-spacing="7" font-weight="500">FORGE · MIRROR ENGINE</text>
  <text x="640" y="86" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">SWEEP → WORKDIR → CLEAN → DISPATCH FLOW</text>
  <line x1="440" y1="103" x2="840" y2="103" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- internal source -->
  <rect x="80" y="128" width="230" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowFM)"/>
  <text x="195" y="152" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">internal main</text>
  <text x="195" y="170" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">dev-box checkout · source</text>

  <line x1="310" y1="158" x2="380" y2="158" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <!-- git_public_mirror_status -->
  <rect x="384" y="128" width="230" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="499" y="152" text-anchor="middle" fill="#e8e3f7" font-size="12.5" font-weight="600">mirror_status</text>
  <text x="499" y="170" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">read-only divergence report</text>

  <line x1="614" y1="158" x2="684" y2="158" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <!-- git_public_mirror_prepare -->
  <rect x="688" y="120" width="260" height="76" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="818" y="146" text-anchor="middle" fill="#a78bff" font-size="13" font-weight="700" letter-spacing="1">mirror_prepare</text>
  <text x="818" y="164" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">MirrorWorkDir::run()</text>
  <text x="818" y="180" text-anchor="middle" fill="#8d84ad" font-size="9.5" font-family="'Courier New',monospace">sync → sweep → gate → commit → tag</text>

  <!-- workdir lifecycle box -->
  <rect x="140" y="222" width="1000" height="180" rx="14" fill="#19161f" stroke="#3a3358" stroke-width="1.2"/>
  <text x="165" y="248" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">workdir.rs — MirrorWorkDir::run() lifecycle</text>

  <g font-size="11">
    <rect x="165" y="262" width="170" height="56" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="181" cy="280" r="4" fill="#8b5cf6"/><text x="191" y="284" fill="#e8e3f7" font-weight="600">1. init</text>
    <text x="181" y="302" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">git init -b main (first run)</text>

    <rect x="350" y="262" width="170" height="56" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="366" cy="280" r="4" fill="#8b5cf6"/><text x="376" y="284" fill="#e8e3f7" font-weight="600">2. sync</text>
    <text x="366" y="302" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">git archive &lt;sha&gt; | tar -x</text>

    <rect x="535" y="262" width="170" height="56" rx="8" fill="#241c42" stroke="#7c5cff" stroke-width="1.2"/>
    <circle cx="551" cy="280" r="4" fill="#4a6cf6"/><text x="561" y="284" fill="#e8e3f7" font-weight="600">3. sweep+gate</text>
    <text x="551" y="302" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">sweep.rs → residual?</text>

    <rect x="720" y="262" width="170" height="56" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="736" cy="280" r="4" fill="#10b981"/><text x="746" y="284" fill="#e8e3f7" font-weight="600">4. commit</text>
    <text x="736" y="302" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">mirror-bot identity, no-op if same</text>

    <rect x="905" y="262" width="170" height="56" rx="8" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
    <circle cx="921" cy="280" r="4" fill="#10b981"/><text x="931" y="284" fill="#e8e3f7" font-weight="600">5. tag</text>
    <text x="921" y="302" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">mirror-approved/&lt;sha&gt; iff 0 residual</text>
  </g>
  <line x1="335" y1="290" x2="350" y2="290" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowFM)"/>
  <line x1="520" y1="290" x2="535" y2="290" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowFM)"/>
  <line x1="705" y1="290" x2="720" y2="290" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowFM)"/>
  <line x1="890" y1="290" x2="905" y2="290" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowFM)"/>

  <text x="165" y="342" fill="#e8e3f7" font-size="11" font-weight="600">Safety invariant: a tree with residual PII is NEVER committed</text>
  <text x="165" y="360" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">— ff-only, force-free pushes mean a dirty ancestor could never be excised later</text>
  <text x="165" y="380" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">residual violations → routed to clean.rs (GHMR-05) instead of returned bare</text>

  <line x1="818" y1="196" x2="818" y2="222" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <!-- clean.rs bounded loop -->
  <line x1="640" y1="402" x2="640" y2="434" stroke="#f0b84d" stroke-width="1.6" marker-end="url(#arrowFM)"/>
  <rect x="160" y="438" width="960" height="150" rx="14" fill="#19161f" stroke="#f0b84d" stroke-width="1.2" opacity="0.95"/>
  <text x="185" y="464" fill="#f0b84d" font-size="12.5" letter-spacing="3" font-weight="600">clean.rs — bounded cleaning pass (residual only, MAX_CLEAN_ROUNDS = 3)</text>

  <rect x="185" y="478" width="230" height="90" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="300" y="500" text-anchor="middle" fill="#e8e3f7" font-size="11.5" font-weight="600">with_protected_git_dir()</text>
  <text x="300" y="518" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">snapshot .git in-memory</text>
  <text x="300" y="534" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">→ CommandCleaner.clean_round()</text>
  <text x="300" y="550" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">→ restore .git regardless</text>

  <line x1="415" y1="522" x2="470" y2="522" stroke="#f0b84d" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <rect x="474" y="478" width="230" height="90" rx="8" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="589" y="500" text-anchor="middle" fill="#e8e3f7" font-size="11.5" font-weight="600">wd.finalize(internal_sha)</text>
  <text x="589" y="518" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">re-sweep, no re-sync</text>
  <text x="589" y="534" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">gate == 0 → commit + tag</text>
  <text x="589" y="550" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">no progress → escalate early</text>

  <line x1="704" y1="522" x2="760" y2="522" stroke="#f0b84d" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <rect x="764" y="478" width="330" height="90" rx="8" fill="#241c42" stroke="#10b981" stroke-width="1.2"/>
  <text x="929" y="500" text-anchor="middle" fill="#e8e3f7" font-size="11.5" font-weight="600">Cleaned  or  Escalated</text>
  <text x="929" y="518" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">Cleaned: committed + tagged, rounds_used</text>
  <text x="929" y="534" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">Escalated: exact file:line spots to operator</text>
  <text x="929" y="550" text-anchor="middle" fill="#9b92c0" font-size="9.5" font-family="'Courier New',monospace">no TERMINUS_MIRROR_CLEAN_CMD → escalate at 0 rounds</text>

  <!-- approve / push guarded chain -->
  <line x1="640" y1="588" x2="640" y2="620" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <rect x="200" y="624" width="380" height="90" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="390" y="650" text-anchor="middle" fill="#a78bff" font-size="12.5" font-weight="700">mirror_approve — GUARDED</text>
  <text x="390" y="668" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">requires mirror-approved/&lt;sha&gt; tag</text>
  <text x="390" y="684" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">approval::gate() → mirror-blessed/&lt;sha&gt;</text>
  <text x="390" y="700" text-anchor="middle" fill="#8d84ad" font-size="9.5" font-family="'Courier New',monospace">content-bound to internal_sha + commit</text>

  <line x1="580" y1="668" x2="660" y2="668" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowFM)"/>

  <rect x="664" y="624" width="416" height="90" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="872" y="650" text-anchor="middle" fill="#a78bff" font-size="12.5" font-weight="700">mirror_push — GUARDED, FF-ONLY</text>
  <text x="872" y="668" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">requires mirror-blessed/&lt;sha&gt; (not mirror-approved)</text>
  <text x="872" y="684" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">ff_state() check → GIT_ASKPASS token injection</text>
  <text x="872" y="700" text-anchor="middle" fill="#8d84ad" font-size="9.5" font-family="'Courier New',monospace">NonFastForward / NoRemoteBranch → refused, never --force</text>

  <line x1="872" y1="714" x2="872" y2="740" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrowFM)"/>
  <rect x="700" y="744" width="344" height="54" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.2"/>
  <text x="872" y="766" text-anchor="middle" fill="#e8e3f7" font-size="12" font-weight="600">public mirror remote · main</text>
  <text x="872" y="784" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">moosenet-io/&lt;repo&gt; — fast-forward only</text>

  <!-- governance band -->
  <rect x="150" y="820" width="980" height="58" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="846" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">git_public routes 'mirror_action' (status/prepare/approve/push) into this exact engine — no duplicated PII/FF logic</text>
  <text x="640" y="864" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">every git argv passes assert_never_force() first · all git ops run on the dev box (sanctioned transport host)</text>
</svg>
