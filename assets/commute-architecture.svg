<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgCom" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowCom" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowCom" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="560" fill="url(#bgCom)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">TRAFFIC &amp; TRANSIT</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">COMMUTE · 4 TOOLS</text>

  <rect x="150" y="112" width="500" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowCom)"/>
  <text x="400" y="146" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">commute_estimate · route_traffic · traffic_incidents</text>

  <rect x="680" y="112" width="450" height="56" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowCom)"/>
  <text x="905" y="138" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">transit_plan</text>
  <text x="905" y="156" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">SF511_API_TOKEN gate · not yet wired</text>

  <line x1="400" y1="168" x2="400" y2="204" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowCom)" opacity="0.85"/>

  <rect x="180" y="210" width="440" height="60" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="400" y="236" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">CommuteConfig::resolve</text>
  <text x="400" y="256" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">home/work/family → COMMUTE_* · IATA code → full airport name</text>

  <line x1="400" y1="270" x2="400" y2="304" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowCom)" opacity="0.85"/>

  <rect x="180" y="310" width="440" height="56" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="204" cy="336" r="5" fill="#4a6cf6"/>
  <text x="400" y="342" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">geocode() → TomTom /search/2/geocode</text>

  <line x1="400" y1="366" x2="400" y2="400" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowCom)" opacity="0.85"/>

  <rect x="180" y="406" width="440" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="204" cy="432" r="5" fill="#10b981"/>
  <text x="400" y="438" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">calculateRoute / incidentDetails</text>
  <text x="400" y="456" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">traffic=true · travelMode · departAt/arriveAt</text>

  <line x1="905" y1="168" x2="905" y2="466" stroke="#564d75" stroke-width="1.4" stroke-dasharray="5,5"/>
  <rect x="700" y="410" width="410" height="56" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="905" y="434" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">Always returns NotConfigured</text>
  <text x="905" y="452" text-anchor="middle" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">honest placeholder, not a fabricated response</text>

  <rect x="150" y="486" width="980" height="52" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="508" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">traffic_summary() buckets delay: clear / light / moderate / heavy — with % over baseline</text>
  <text x="640" y="526" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">TOMTOM_API_KEY unset → the 3 driving tools become NotConfigured stubs; transit_plan is unaffected</text>
</svg>
