<svg width="1280" height="480" viewBox="0 0 1280 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgNews" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowNews" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowNews" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="480" fill="url(#bgNews)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">HEADLINES · SEARCH · TOPIC</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">NEWS · 3 TOOLS</text>

  <rect x="150" y="112" width="440" height="52" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowNews)"/>
  <text x="370" y="144" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">news_headlines · news_search</text>

  <rect x="690" y="112" width="440" height="52" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowNews)"/>
  <text x="910" y="144" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">news_topic</text>

  <line x1="370" y1="164" x2="370" y2="200" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNews)" opacity="0.85"/>
  <line x1="910" y1="164" x2="910" y2="200" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNews)" opacity="0.85"/>

  <rect x="150" y="206" width="440" height="66" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="370" y="232" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">1. try NewsAPI (if NEWSAPI_KEY set)</text>
  <text x="370" y="254" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">on failure → fall back to GNews (if configured)</text>

  <rect x="690" y="206" width="440" height="66" rx="10" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="910" y="232" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">GNews only</text>
  <text x="910" y="254" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">no NewsAPI fallback, even if NEWSAPI_KEY is set</text>

  <line x1="370" y1="272" x2="370" y2="306" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNews)" opacity="0.85"/>
  <line x1="910" y1="272" x2="910" y2="306" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNews)" opacity="0.85"/>

  <rect x="150" y="312" width="980" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="174" cy="338" r="5" fill="#10b981"/>
  <text x="640" y="344" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">article_from_newsapi / article_from_gnews — normalized to one shape</text>
  <text x="640" y="364" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">{title, description, source, url, published}</text>

  <rect x="150" y="392" width="980" height="52" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="418" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">Both keys missing → all 3 tools still register, each returns NotConfigured at call time</text>
</svg>
