<svg width="1180" height="460" viewBox="0 0 1180 460" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgrm" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowRm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowRm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1180" height="460" fill="url(#bgrm)"/>
  <text x="590" y="44" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">REMINDER · ONE-SHOT ALERT LIFECYCLE</text>
  <text x="590" y="76" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700" letter-spacing="2">reminders table · 4 tools · lumina-core scheduler polls terminus-rs</text>
  <line x1="380" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="128" width="230" height="76" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowRm)"/>
  <text x="175" y="154" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">reminder_set</text>
  <text x="175" y="172" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">parse_time(phrase, tz, now)</text>
  <text x="175" y="188" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">retries INSERT once on error</text>

  <line x1="290" y1="166" x2="360" y2="166" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowRm)"/>
  <rect x="360" y="128" width="220" height="76" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="470" y="154" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">fired=false</text>
  <text x="470" y="172" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">cancelled=false</text>
  <text x="470" y="188" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">ordered by fire_at ASC</text>

  <line x1="580" y1="166" x2="650" y2="166" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrowRm)"/>
  <rect x="650" y="128" width="220" height="76" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="760" y="154" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">reminder_poll</text>
  <text x="760" y="172" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">SELECT...FOR UPDATE SKIP LOCKED</text>
  <text x="760" y="188" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">then UPDATE fired=true (1 tx)</text>

  <line x1="870" y1="166" x2="940" y2="166" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrowRm)"/>
  <rect x="940" y="128" width="180" height="76" rx="10" fill="#1d1736" stroke="#10b981" stroke-width="1.4"/>
  <text x="1030" y="154" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">fired=true</text>
  <text x="1030" y="172" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">[{id,message}] JSON</text>
  <text x="1030" y="188" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">→ lumina-core → Matrix</text>

  <line x1="470" y1="204" x2="470" y2="256" stroke="#8b5cf6" stroke-width="1.6" marker-end="url(#arrowRm)"/>
  <rect x="360" y="256" width="220" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="470" y="282" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">reminder_cancel</text>
  <text x="470" y="300" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">cancelled=true (idempotent guard)</text>

  <rect x="60" y="256" width="220" height="60" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="170" y="282" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">reminder_list</text>
  <text x="170" y="300" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">pending only, human-readable</text>
  <line x1="180" y1="256" x2="360" y2="204" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.6"/>

  <rect x="60" y="344" width="1060" height="60" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="368" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">crash window: a reminder is marked fired inside the same transaction that returns it</text>
  <text x="590" y="388" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">a crash after commit but before Matrix delivery drops that one reminder — accepted "mark-and-return" tradeoff</text>

  <text x="590" y="436" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">timezone resolution: explicit arg → LUMINA_TIMEZONE env → America/Los_Angeles default</text>
</svg>
