<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow5" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1280" height="560" fill="url(#bg5)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">PLANE PREFIX REGISTRY</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">BASELINE + OVERLAY MERGE</text>
  <line x1="470" y1="98" x2="810" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="80" y="140" width="360" height="110" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadow5)"/>
  <text x="100" y="166" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">BASELINE (git-versioned)</text>
  <text x="100" y="190" fill="#e8e3f7" font-size="12.5" font-weight="600">data/prefix_registry.toml</text>
  <text x="100" y="210" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">include_str! — compiled into the binary</text>
  <text x="100" y="228" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">always readable, no working-dir/Redis dependency</text>

  <rect x="840" y="140" width="360" height="110" rx="12" fill="#1d1736" stroke="#4a6cf6" stroke-width="1.6" filter="url(#cardShadow5)"/>
  <text x="860" y="166" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">OVERLAY (runtime, Redis)</text>
  <text x="860" y="190" fill="#e8e3f7" font-size="12.5" font-weight="600">HASH plane:prefix:overlay:v1</text>
  <text x="860" y="210" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">shares PLANE_REDIS_URL with the GET cache</text>
  <text x="860" y="228" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">register() → HSETNX · retire() → HSET override</text>

  <line x1="440" y1="195" x2="580" y2="290" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow5)"/>
  <line x1="840" y1="195" x2="700" y2="290" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrow5)"/>

  <rect x="480" y="296" width="320" height="110" rx="12" fill="#241c42" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="500" y="322" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">PrefixStore::merged()</text>
  <text x="500" y="346" fill="#e8e3f7" font-size="12" font-weight="600">overlay entry wins as effective row</text>
  <text x="500" y="366" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">baseline flag preserved for source_label()</text>
  <text x="500" y="384" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">unreachable Redis → baseline-only, fail-open</text>

  <line x1="640" y1="406" x2="640" y2="450" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrow5)"/>

  <rect x="150" y="456" width="980" height="76" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="482" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">source: baseline | overlay-only | baseline+overlay · pending_promotion = in_overlay &amp;&amp; !in_baseline</text>
  <text x="640" y="504" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">promotion into the reviewed baseline TOML happens later via a small PR — the overlay is not the source of truth</text>

  <text x="640" y="552" text-anchor="middle" fill="#564d75" font-size="11" font-family="'Courier New',monospace">prefix.rs:384-441 (PrefixStore::merged) · these are per-spec item prefixes (SCRB, RMDR, …), NOT the per-repo Plane project prefixes</text>
</svg>
