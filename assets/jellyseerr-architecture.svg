  <text x="640" y="148" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">status · requests · request_count · search</text>

  <line x1="640" y1="172" x2="640" y2="206" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowJs)" opacity="0.85"/>

