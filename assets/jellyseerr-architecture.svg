  <text x="640" y="350" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600"><media-service> server</text>
  <text x="640" y="368" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">routes to Radarr/Sonarr for download</text>

  <rect x="150" y="394" width="980" height="50" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="416" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">parse_requests / parse_search normalize status codes and truncate for display</text>
