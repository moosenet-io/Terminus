  <text x="640" y="264" text-anchor="middle" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">GET {JELLYSEERR_URL}/api/v1{path} · header X-Api-Key</text>

  <line x1="640" y1="278" x2="640" y2="312" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowJs)" opacity="0.85"/>

  <rect x="330" y="318" width="620" height="60" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
