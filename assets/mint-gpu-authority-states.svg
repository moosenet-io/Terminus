<svg width="1280" height="900" viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgGpu" cx="50%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowGpu" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGpu" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#10b981"/></marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#4a6cf6"/></marker>
  </defs>

  <rect width="1280" height="900" fill="url(#bgGpu)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">/run/gpu-authority.lock</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">GPU-AUTHORITY LOCK · STATE &amp; TRANSITIONS</text>
  <line x1="440" y1="100" x2="840" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- UNLOCKED -->
  <rect x="60" y="150" width="230" height="92" rx="12" fill="#1d1736" stroke="#10b981" stroke-width="1.6" filter="url(#cardShadowGpu)"/>
  <circle cx="84" cy="176" r="5" fill="#10b981"/>
  <text x="98" y="181" fill="#e8e3f7" font-size="15" font-weight="700">UNLOCKED</text>
  <text x="80" y="203" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">no lock file present</text>
  <text x="80" y="219" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">(fresh boot: /run is tmpfs,</text>
  <text x="80" y="233" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">cleared on every reboot)</text>

  <!-- HELD -->
  <rect x="500" y="140" width="280" height="150" rx="14" fill="#241c42" stroke="#7c5cff" stroke-width="1.8" filter="url(#cardShadowGpu)"/>
  <text x="520" y="166" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">HELD</text>
  <circle cx="750" cy="160" r="5" fill="#8b5cf6"/>
  <text x="520" y="190" fill="#e8e3f7" font-size="13.5" font-family="'Courier New',monospace">holder, mode, pid, acquired_at</text>
  <text x="520" y="208" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">stopped_services: [...]</text>
  <text x="520" y="224" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">chord_notified: bool</text>
  <text x="520" y="248" fill="#cbc4e6" font-size="10.5" font-family="'Courier New',monospace">Exclusive: Ollama pinned to 1</text>
  <text x="520" y="262" fill="#cbc4e6" font-size="10.5" font-family="'Courier New',monospace">resident model, lemonade-coder</text>
  <text x="520" y="276" fill="#cbc4e6" font-size="10.5" font-family="'Courier New',monospace">stopped, Chord notified over HTTP</text>

  <!-- BLOCKED / WAITING -->
  <rect x="960" y="150" width="260" height="110" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.4" filter="url(#cardShadowGpu)"/>
  <circle cx="984" cy="176" r="5" fill="#4a6cf6"/>
  <text x="998" y="181" fill="#e8e3f7" font-size="14.5" font-weight="700">BLOCKED / WAITING</text>
  <text x="980" y="203" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">different, live pid holds it</text>
  <text x="980" y="219" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">acquire_with_backoff polls every</text>
  <text x="980" y="235" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">ACQUIRE_POLL_INTERVAL = 60s</text>
  <text x="980" y="251" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">gives up after max_wait (4h default)</text>

  <!-- ABANDONED -->
  <rect x="500" y="360" width="280" height="96" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.4" filter="url(#cardShadowGpu)" stroke-dasharray="5,4"/>
  <circle cx="524" cy="386" r="5" fill="#4a6cf6"/>
  <text x="538" y="391" fill="#e8e3f7" font-size="14.5" font-weight="700">ABANDONED</text>
  <text x="520" y="413" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">recorded pid failed /proc/&lt;pid&gt;</text>
  <text x="520" y="429" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">liveness check — prior holder died</text>
  <text x="520" y="445" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">without releasing (crash / SIGKILL)</text>

  <!-- arrows: UNLOCKED -> HELD -->
  <path d="M290 196 L500 205" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="320" y="188" fill="#9bd8bc" font-size="11" font-family="'Courier New',monospace">acquire(mode, holder)</text>

  <!-- HELD -> BLOCKED (someone else tries) -->
  <path d="M780 195 L960 190" stroke="#4a6cf6" stroke-width="1.8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="800" y="182" fill="#a9bdfa" font-size="10.5" font-family="'Courier New',monospace">different alive pid acquires</text>

  <!-- BLOCKED -> HELD (retry succeeds after release) -->
  <path d="M1010 260 C 950 340, 850 300, 782 260" stroke="#7c5cff" stroke-width="1.6" fill="none" marker-end="url(#arrowGpu)" opacity="0.85"/>
  <text x="850" y="332" fill="#c9b8ff" font-size="10.5" font-family="'Courier New',monospace">lock frees → next poll succeeds</text>

  <!-- HELD self loop: idempotent re-acquire -->
  <path d="M640 140 C 610 100, 690 100, 660 140" stroke="#7c5cff" stroke-width="1.6" fill="none" marker-end="url(#arrowGpu)" opacity="0.8"/>
  <text x="640" y="96" text-anchor="middle" fill="#c9b8ff" font-size="10.5" font-family="'Courier New',monospace">same holder + same pid → no-op</text>

  <!-- HELD -> ABANDONED (pid dies) -->
  <path d="M600 290 L600 360" stroke="#4a6cf6" stroke-width="1.8" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="608" y="328" fill="#a9bdfa" font-size="10.5" font-family="'Courier New',monospace">holder process dies</text>
  <text x="608" y="343" fill="#a9bdfa" font-size="10.5" font-family="'Courier New',monospace">(no release() called)</text>

  <!-- ABANDONED -> HELD (self-heal takeover) -->
  <path d="M500 400 C 420 360, 400 240, 500 220" stroke="#10b981" stroke-width="1.8" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="330" y="300" fill="#9bd8bc" font-size="10.5" font-family="'Courier New',monospace">PID-aware self-heal:</text>
  <text x="330" y="315" fill="#9bd8bc" font-size="10.5" font-family="'Courier New',monospace">next acquire (any holder)</text>
  <text x="330" y="330" fill="#9bd8bc" font-size="10.5" font-family="'Courier New',monospace">takes over — full apply path</text>

  <!-- HELD -> UNLOCKED (release) -->
  <path d="M560 290 C 480 340, 300 300, 210 244" stroke="#f97373" stroke-width="1.8" fill="none" marker-end="url(#arrowGpu)"/>
  <text x="260" y="270" fill="#f3b0b0" font-size="10.5" font-family="'Courier New',monospace">release(holder) — restarts exactly</text>
  <text x="260" y="285" fill="#f3b0b0" font-size="10.5" font-family="'Courier New',monospace">what THIS acquire stopped</text>

  <!-- Fairness / safety-valve band -->
  <rect x="150" y="500" width="980" height="150" rx="14" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowGpu)"/>
  <text x="175" y="528" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">FAIRNESS · RELEASE-BETWEEN-UNITS (per (model, backend) pass / per model)</text>
  <g font-size="11" fill="#cbc4e6" font-family="'Courier New',monospace">
    <text x="175" y="556">HELD ── end of unit ──▶ release() ──▶ pause INTER_UNIT_RELEASE_PAUSE = 90s ──▶ acquire_with_backoff() ──▶ HELD (next unit)</text>
    <text x="175" y="580" fill="#9b92c0">90s &gt; ACQUIRE_POLL_INTERVAL (60s) guarantees a waiting sweep observes the free window — real alternation, not thrash.</text>
  </g>
  <line x1="175" y1="598" x2="1105" y2="598" stroke="#3a3358" stroke-width="1"/>
  <text x="175" y="622" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">SAFETY VALVE · MAX CONTINUOUS HOLD</text>
  <g font-size="11" fill="#cbc4e6" font-family="'Courier New',monospace">
    <text x="175" y="644">checked after every sub-unit (one case / one dimension): held ≥ MAX_LOCK_HOLD (default 45 min) ⇒ mid-unit release + 90s pause + reacquire, same unit resumes</text>
  </g>

  <!-- Chord coordination band -->
  <rect x="150" y="670" width="980" height="100" rx="14" fill="#19161f" stroke="#3a3358" stroke-width="1.2"/>
  <text x="175" y="696" fill="#cbc4e6" font-size="12.5" font-weight="600">CHORD HTTP COORDINATION (Exclusive mode only)</text>
  <text x="175" y="718" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">acquire: POST &lt;chord&gt;/v1/gpu-exclusive/acquire  ·  release: POST &lt;chord&gt;/v1/gpu-exclusive/release  ·  409 = held elsewhere, 401/403 = bad CHORD_JWT</text>
  <text x="175" y="738" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">background heartbeat re-POSTs acquire every CHORD_GPU_EXCLUSIVE_HEARTBEAT_SECS (default 120s) to stay under Chord's own TTL — a crashed holder just stops heartbeating</text>
  <text x="175" y="756" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">and Chord's TTL expiry resumes serving on its own; Chord unreachable at acquire time is NOT an error (nothing is contending for the GPU)</text>

  <!-- governance/footer -->
  <rect x="150" y="792" width="980" height="58" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="818" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">ONE LOCAL FILE LOCK + ONE REMOTE HTTP LEASE — NEVER TWO EXCLUSIVE GPU JOBS AT ONCE</text>
  <text x="640" y="838" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">PID-aware self-heal · bounded backoff · release-between-units fairness · 45-min hold ceiling</text>

  <text x="640" y="882" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">gpu_authority.rs — the single authority every MINT sweep and case rerun acquires through.</text>
</svg>
