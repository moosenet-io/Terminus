<svg width="1280" height="620" viewBox="0 0 1280 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgIn" cx="50%" cy="28%" r="88%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowIn" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowIn" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1280" height="620" fill="url(#bgIn)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">src/intake/mod.rs</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">INTAKE · 4 MCP TOOLS OVER THE MINT HARNESS</text>
  <line x1="440" y1="98" x2="840" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- 4 tools row -->
  <g font-size="12.5" font-weight="700">
    <rect x="70" y="130" width="270" height="70" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.4"/>
    <circle cx="92" cy="154" r="5" fill="#8b5cf6"/><text x="106" y="159" fill="#e8e3f7">model_intake</text>
    <text x="90" y="180" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace" font-weight="400">one model, suites: context/code/agent</text>

    <rect x="360" y="130" width="270" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2"/>
    <circle cx="382" cy="154" r="5" fill="#4a6cf6"/><text x="396" y="159" fill="#e8e3f7">model_intake_status</text>
    <text x="380" y="180" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace" font-weight="400">read back stored operational profile</text>

    <rect x="650" y="130" width="270" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2"/>
    <circle cx="672" cy="154" r="5" fill="#4a6cf6"/><text x="686" y="159" fill="#e8e3f7">model_intake_compare</text>
    <text x="670" y="180" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace" font-weight="400">one metric, table across N models</text>

    <rect x="940" y="130" width="270" height="70" rx="10" fill="#241c42" stroke="#7c5cff" stroke-width="1.4"/>
    <circle cx="962" cy="154" r="5" fill="#8b5cf6"/><text x="976" y="159" fill="#e8e3f7">model_intake_fleet</text>
    <text x="960" y="180" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace" font-weight="400">whole catalog, overnight, VRAM-serial</text>
  </g>

  <path d="M340 165 L360 165" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowIn)" opacity="0.6"/>
  <path d="M630 165 L650 165" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowIn)" opacity="0.6"/>
  <path d="M920 165 L940 165" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowIn)" opacity="0.6"/>

  <!-- purpose routing band -->
  <rect x="150" y="232" width="980" height="110" rx="12" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowIn)"/>
  <text x="175" y="258" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">PURPOSE ROUTING · default_suites_for(model_name)</text>
  <g font-size="11" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="175" y="282">"coder" → context+code   ·   "gpt-oss" → context+agent   ·   "qwen3:8b"/"harness" → context+code+agent</text>
    <text x="175" y="302">"diffusiongemma"/"dgem" → context+code, but is_non_ollama_daemon() SKIPS it (own C++ daemon, see dgem.md)</text>
    <text x="175" y="322" fill="#9b92c0">default → context only  ·  code_languages_for(): coder models get rust/ts/python/bash/htmlcss, else python/bash</text>
  </g>

  <!-- down arrow to MINT -->
  <path d="M640 342 L640 380" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowIn)"/>

  <!-- MINT box -->
  <rect x="290" y="392" width="700" height="90" rx="14" fill="#241c42" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowIn)"/>
  <text x="315" y="420" fill="#a78bff" font-size="13" letter-spacing="4" font-weight="600">MINT HARNESS · src/intake/{runner,code_v2,agent,serving}.rs</text>
  <text x="315" y="448" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">3 axes: context stress · code v1/v2 · agent  →  GPU-authority lock  →  Postgres</text>
  <text x="315" y="466" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">full deep-dive: docs/tools/mint/README.md</text>

  <!-- footer -->
  <text x="640" y="530" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">This page documents the 4 tool schemas only — the harness internals are the MINT flagship manual.</text>
  <text x="640" y="552" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">skips DiffusionGemma cleanly (non-Ollama daemon) rather than erroring</text>
</svg>
