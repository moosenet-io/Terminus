<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <marker id="arrow4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1280" height="560" fill="url(#bg4)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">PLANE MODULE</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">WORK-ITEM STATE GROUPS</text>
  <line x1="470" y1="98" x2="810" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- 5 state-group chips -->
  <g font-size="13" font-weight="600">
    <rect x="60" y="140" width="210" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="82" cy="164" r="5" fill="#8b5cf6"/><text x="96" y="168" fill="#e8e3f7">backlog</text>
    <rect x="290" y="140" width="210" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="312" cy="164" r="5" fill="#8b5cf6"/><text x="326" y="168" fill="#e8e3f7">unstarted</text>
    <rect x="520" y="140" width="210" height="70" rx="10" fill="#241c42" stroke="#4a6cf6" stroke-width="1.2"/>
    <circle cx="542" cy="164" r="5" fill="#4a6cf6"/><text x="556" y="168" fill="#e8e3f7">started</text>
    <rect x="750" y="140" width="210" height="70" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.4"/>
    <circle cx="772" cy="164" r="5" fill="#10b981"/><text x="786" y="168" fill="#e8e3f7">completed</text>
    <rect x="980" y="140" width="210" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
    <circle cx="1002" cy="164" r="5" fill="#8b5cf6"/><text x="1016" y="168" fill="#e8e3f7">cancelled</text>
  </g>
  <text x="165" y="196" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">Issue.state_detail.group</text>

  <line x1="270" y1="175" x2="290" y2="175" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.7"/>
  <line x1="500" y1="175" x2="520" y2="175" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.7"/>
  <line x1="730" y1="175" x2="750" y2="175" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.7"/>
  <line x1="960" y1="175" x2="980" y2="175" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrow4)" opacity="0.7"/>

  <!-- client-side filter -->
  <rect x="60" y="250" width="1130" height="80" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="80" y="274" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">plane_list_issues_by_state</text>
  <text x="80" y="296" fill="#e8e3f7" font-size="12.5" font-weight="600">fetches ALL project issues, filters client-side on state_detail.group</text>
  <text x="80" y="316" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">state_group query param is broken in Plane CE — never sent to the server</text>

  <!-- close work item -->
  <rect x="60" y="352" width="1130" height="90" rx="12" fill="#1d1736" stroke="#4a6cf6" stroke-width="1.4"/>
  <text x="80" y="376" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">plane_close_work_item</text>
  <text x="80" y="398" fill="#e8e3f7" font-size="12.5" font-weight="600">GET states/ → first state whose group == "completed" → PATCH issue.state</text>
  <text x="80" y="420" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">no completed-group state in the project → ToolError::NotFound, no PATCH sent</text>
  <text x="80" y="436" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">"first" is whatever order the Plane states endpoint returns — not guaranteed stable across projects</text>

  <text x="640" y="496" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">STATES ARE PER-PROJECT · plane_list_states / plane_get_state_by_name resolve names → UUIDs</text>
  <text x="640" y="520" text-anchor="middle" fill="#564d75" font-size="11" font-family="'Courier New',monospace">mod.rs:2296-2332 (list_issues_by_state) · mod.rs:2538-2576 (close_work_item)</text>
</svg>
