<svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgSup" cx="50%" cy="24%" r="88%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowSup" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowSup" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="860" fill="url(#bgSup)"/>

  <text x="640" y="48" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">MINT · SUPERVISOR + BREAKFIX</text>
  <text x="640" y="86" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">JAM DETECTION → RESTART-RECOVERY → ESCALATION LADDER</text>
  <line x1="380" y1="104" x2="900" y2="104" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== Tick loop ===== -->
  <rect x="60" y="130" width="1160" height="100" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="85" y="156" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">EVERY 90s TICK (supervisor::tick, pure DB OBSERVER — SELECT only, never writes code_profile_runs/model_profiles)</text>
  <g font-family="'Courier New',monospace" font-size="11" fill="#cbc4e6">
    <text x="85" y="180">max(created_at) FROM code_profile_runs</text>
    <text x="85" y="198">→ age = now - last_row_epoch</text>
    <text x="420" y="180">/sys/class/drm/card*/gpu_busy_percent</text>
    <text x="420" y="198">systemctl is-active (coder-sweep, assistant-sweep)</text>
    <text x="800" y="180">verdict = idle | working | stuck</text>
    <text x="800" y="198">stuck ⟺ gpu_busy≥70% AND age&gt;2700s</text>
  </g>
  <text x="85" y="218" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">supervisor.rs:165-173 compute_verdict (pure) · idle checked first so a busy-but-unrelated GPU never reads as stuck</text>

  <line x1="640" y1="230" x2="640" y2="266" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowSup)"/>

  <!-- ===== Stuck branch ===== -->
  <rect x="420" y="268" width="440" height="70" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowSup)"/>
  <text x="640" y="296" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">verdict = STUCK + cooldown elapsed (&gt;3600s since last recovery)</text>
  <text x="640" y="316" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">supervisor.rs:179-181 should_recover · anti-thrash</text>

  <line x1="640" y1="338" x2="640" y2="368" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowSup)"/>

  <g>
    <rect x="150" y="370" width="380" height="90" rx="12" fill="#241c42" stroke="#4a6cf6" stroke-width="1.4" filter="url(#cardShadowSup)"/>
    <circle cx="174" cy="394" r="5" fill="#4a6cf6"/>
    <text x="188" y="399" fill="#e8e3f7" font-size="13" font-weight="600">Restart-recovery (always happens)</text>
    <text x="170" y="420" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">systemctl restart ollama.service</text>
    <text x="170" y="437" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">settle 5s → restart active sweep unit(s)</text>
    <text x="170" y="452" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">GPU-authority lock never touched here</text>
  </g>

  <line x1="640" y1="338" x2="960" y2="370" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowSup)" opacity="0.85"/>

  <g>
    <rect x="750" y="370" width="420" height="90" rx="12" fill="#241c42" stroke="#8b5cf6" stroke-width="1.4" filter="url(#cardShadowSup)"/>
    <circle cx="774" cy="394" r="5" fill="#8b5cf6"/>
    <text x="788" y="399" fill="#e8e3f7" font-size="13" font-weight="600">Repeat-stuck check (same combo)</text>
    <text x="770" y="420" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">≥3 recoveries within a 4h rolling window</text>
    <text x="770" y="437" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">(model, backend, mem_config) ComboKey</text>
    <text x="770" y="452" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">supervisor.rs:188-193 is_repeat_stuck</text>
  </g>

  <line x1="960" y1="460" x2="960" y2="496" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowSup)"/>

  <!-- ===== Breakfix handler ===== -->
  <rect x="700" y="498" width="480" height="80" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowSup)"/>
  <text x="940" y="524" text-anchor="middle" fill="#a78bff" font-size="13" font-weight="600" letter-spacing="1">SubagentBreakfix::handle_repeat_stuck (breakfix.rs)</text>
  <text x="940" y="546" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">block_in_place bridge into decide_breakfix — bounded loop, MAX_ATTEMPTS=5</text>
  <text x="940" y="564" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">reasoning: claude CLI (primary) → CPU-Ollama (fallback), never GPU</text>

  <line x1="940" y1="578" x2="940" y2="608" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowSup)"/>

  <!-- ===== Verdict ladder ===== -->
  <g font-size="12">
    <rect x="150" y="610" width="200" height="86" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.3"/>
    <circle cx="172" cy="632" r="5" fill="#10b981"/><text x="186" y="637" fill="#e8e3f7" font-weight="600">retry(config)</text>
    <text x="170" y="656" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">single-case retest</text>
    <text x="170" y="671" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">success ⇒ Resolved</text>
    <text x="170" y="686" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">fail ⇒ next attempt</text>

    <rect x="370" y="610" width="200" height="86" rx="10" fill="#241c42" stroke="#4a6cf6" stroke-width="1.3"/>
    <circle cx="392" cy="632" r="5" fill="#4a6cf6"/><text x="406" y="637" fill="#e8e3f7" font-weight="600">fetch_model()</text>
    <text x="390" y="656" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">re-pull via Chord</text>
    <text x="390" y="671" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">warmed ⇒ retest once</text>
    <text x="390" y="686" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">fail ⇒ next attempt</text>

    <rect x="590" y="610" width="200" height="86" rx="10" fill="#241c42" stroke="#8b5cf6" stroke-width="1.3"/>
    <circle cx="612" cy="632" r="5" fill="#8b5cf6"/><text x="626" y="637" fill="#e8e3f7" font-weight="600">drop(reason)</text>
    <text x="610" y="656" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">terminal — writes</text>
    <text x="610" y="671" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">mint_dropped_configs</text>
    <text x="610" y="686" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">(new Postgres row)</text>

    <rect x="810" y="610" width="200" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3"/>
    <circle cx="832" cy="632" r="5" fill="#c9b8ff"/><text x="846" y="637" fill="#e8e3f7" font-weight="600">codefix(...)</text>
    <text x="830" y="656" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">logged, NOT auto-run</text>
    <text x="830" y="671" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">falls through to</text>
    <text x="830" y="686" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">escalate behavior</text>

    <rect x="1030" y="610" width="200" height="86" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3"/>
    <circle cx="1052" cy="632" r="5" fill="#c9b8ff"/><text x="1066" y="637" fill="#e8e3f7" font-weight="600">escalate(reason)</text>
    <text x="1050" y="656" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">terminal — human</text>
    <text x="1050" y="671" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">hand-off, logged to</text>
    <text x="1050" y="686" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">the shared log file</text>
  </g>
  <text x="640" y="722" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">breakfix.rs:839-916 decide_breakfix · budget-exhausted after MAX_ATTEMPTS always resolves to Drop, never loops unbounded</text>

  <!-- governance/observer band -->
  <rect x="60" y="750" width="1160" height="72" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="778" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">SEPARATION OF CONCERNS · supervisor.rs never touches the GPU-authority lock or writes code_profile_runs/model_profiles</text>
  <text x="640" y="798" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">it restarts services and appends to its own log/state files; the sweep binaries own ExclusiveGuard re-acquisition; breakfix owns the one new Postgres write (mint_dropped_configs)</text>

  <text x="640" y="844" text-anchor="middle" fill="#564d75" font-size="11" letter-spacing="0.4">The daemon always restart-recovers as a safe backstop — a handler decision changes the logs, never the fallback.</text>
</svg>
