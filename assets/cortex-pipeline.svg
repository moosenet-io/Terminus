<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgCortex" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowC" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowC" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bgCortex)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">CODE &amp; GIT · CORTEX</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">CORTEX · SSH-RELAY CODE-GRAPH TOOLS</text>
  <line x1="430" y1="98" x2="850" y2="98" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- MCP client -->
  <rect x="500" y="120" width="280" height="52" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowC)"/>
  <text x="640" y="142" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">MCP client</text>
  <text x="640" y="160" text-anchor="middle" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">tools/call cortex_*</text>
  <line x1="640" y1="172" x2="640" y2="204" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowC)"/>

  <!-- Terminus cortex module -->
  <rect x="330" y="208" width="620" height="80" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="352" y="234" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">TERMINUS · src/cortex/ · 10 RustTool IMPLS</text>
  <circle cx="640" cy="230" r="4.5" fill="#c9b8ff"/>
  <text x="352" y="258" fill="#e8e3f7" font-size="12.5" font-weight="500">validate_repo / validate_text_len · cortex_audit: validate_repo_url (SSRF guard)</text>
  <text x="352" y="276" fill="#a89fc8" font-size="11" font-family="'Courier New',monospace">shell_single_quote(payload) → build_command(script, subcommand, json)</text>
  <line x1="640" y1="288" x2="640" y2="320" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowC)"/>

  <!-- SSH hop -->
  <rect x="420" y="324" width="440" height="66" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowC)"/>
  <circle cx="444" cy="348" r="5" fill="#4a6cf6"/>
  <text x="460" y="352" fill="#e8e3f7" font-size="13" font-weight="600">ssh_exec() — TCP :22, pubkey auth</text>
  <text x="444" y="374" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">CORTEX_SSH_HOST · CORTEX_SSH_USER · CORTEX_SSH_KEY_PATH</text>
  <line x1="640" y1="390" x2="640" y2="422" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowC)"/>

  <!-- fleet host script -->
  <rect x="380" y="426" width="520" height="64" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowC)"/>
  <circle cx="404" cy="450" r="5" fill="#10b981"/>
  <text x="420" y="454" fill="#e8e3f7" font-size="13" font-weight="600">remote script on the fleet host (CORTEX_SCRIPT)</text>
  <text x="404" y="474" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">&lt;script&gt; &lt;subcommand&gt; '&lt;json-payload&gt;'  — owns the actual code graph</text>

  <!-- fan out arrows -->
  <line x1="500" y1="490" x2="330" y2="536" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowC)" opacity="0.85"/>
  <line x1="780" y1="490" x2="950" y2="536" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowC)" opacity="0.85"/>

  <!-- Flavor A -->
  <rect x="140" y="540" width="380" height="110" rx="12" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowC)"/>
  <text x="164" y="566" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">FLAVOR A · bare-error propagate</text>
  <text x="164" y="588" fill="#e8e3f7" font-size="12" font-weight="500">scope · review · audit · stats · build</text>
  <text x="164" y="608" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">SSH/exec failure → ToolError::Execution</text>
  <text x="164" y="624" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">stdout parsed as JSON, else {"raw": "..."}</text>
  <text x="164" y="640" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">run_subcommand()</text>

  <!-- Flavor B -->
  <rect x="760" y="540" width="380" height="110" rx="12" fill="#1d1736" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowC)"/>
  <text x="784" y="566" fill="#a78bff" font-size="12" letter-spacing="2" font-weight="600">FLAVOR B · degrades to shaped JSON</text>
  <text x="784" y="588" fill="#e8e3f7" font-size="12" font-weight="500">architecture · deps · recent · community · flows</text>
  <text x="784" y="608" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">SSH/exec failure → verified partial shape (200-like)</text>
  <text x="784" y="624" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">NotConfigured still propagates as an error</text>
  <text x="784" y="640" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">run_subcommand_degrading()</text>

  <!-- governance band -->
  <rect x="140" y="672" width="1000" height="56" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="696" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">NO LOCAL GRAPH ENGINE — the graph is built, persisted, and queried entirely on the fleet host</text>
  <text x="640" y="716" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">cortex_audit adds validate_repo_url(): http(s)-only · no userinfo · no shell metachars · loopback/private/link-local/metadata hosts rejected</text>

  <text x="640" y="750" text-anchor="middle" fill="#564d75" font-size="11" letter-spacing="0.4">This crate relays a remote script's output verbatim — it never builds or holds the code graph itself.</text>
</svg>
