<svg width="1180" height="420" viewBox="0 0 1180 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgnx" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowNx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowNx" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>
  <rect width="1180" height="420" fill="url(#bgnx)"/>
  <text x="590" y="44" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">NEXUS · INTER-AGENT INBOX</text>
  <text x="590" y="76" text-anchor="middle" fill="#ffffff" font-size="25" font-weight="700" letter-spacing="2">inbox_messages · 5 tools over DATABASE_URL</text>
  <line x1="380" y1="92" x2="800" y2="92" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <rect x="60" y="130" width="200" height="64" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowNx)"/>
  <text x="160" y="156" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">nexus_send</text>
  <text x="160" y="176" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">from → to, jsonb payload</text>

  <line x1="260" y1="162" x2="330" y2="162" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNx)"/>
  <rect x="330" y="130" width="220" height="64" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.4"/>
  <text x="440" y="156" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="700">status=pending</text>
  <text x="440" y="176" text-anchor="middle" fill="#a89fc8" font-size="10" font-family="'Courier New',monospace">to_agent's inbox</text>

  <line x1="550" y1="150" x2="630" y2="150" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrowNx)"/>
  <rect x="630" y="118" width="200" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="730" y="144" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">nexus_check</text>
  <text x="730" y="162" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">COUNT(*) pending</text>

  <line x1="550" y1="176" x2="630" y2="176" stroke="#4a6cf6" stroke-width="1.6" marker-end="url(#arrowNx)"/>
  <rect x="630" y="186" width="200" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="730" y="212" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">nexus_read</text>
  <text x="730" y="230" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">latest N (default 20)</text>

  <line x1="830" y1="216" x2="900" y2="216" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowNx)"/>
  <rect x="900" y="186" width="220" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="1010" y="212" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">nexus_ack(message_id)</text>
  <text x="1010" y="230" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">WHERE to_agent=$2 (enforced)</text>

  <line x1="1010" y1="246" x2="1010" y2="280" stroke="#10b981" stroke-width="1.6" marker-end="url(#arrowNx)"/>
  <rect x="900" y="280" width="220" height="50" rx="10" fill="#1d1736" stroke="#10b981" stroke-width="1.4"/>
  <text x="1010" y="310" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="700">status=read</text>

  <rect x="330" y="280" width="220" height="60" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2"/>
  <text x="440" y="306" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">nexus_history</text>
  <text x="440" y="324" text-anchor="middle" fill="#9b92c0" font-size="10" font-family="'Courier New',monospace">all statuses, last N</text>
  <line x1="440" y1="280" x2="440" y2="194" stroke="#8b5cf6" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>

  <rect x="60" y="356" width="1060" height="46" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="590" y="384" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">access control is SQL-enforced on every read/write — a caller only ever sees or acknowledges its own to_agent rows</text>
</svg>
