<svg width="1280" height="560" viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgWx" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowWx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowWx" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="560" fill="url(#bgWx)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">CURRENT + FORECAST</text>
  <text x="640" y="80" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="2">WEATHER · 1 TOOL, 4 SUBSYSTEMS</text>

  <rect x="440" y="112" width="400" height="52" rx="10" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowWx)"/>
  <text x="640" y="144" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">location omitted? → COMMUTE_HOME</text>

  <line x1="640" y1="164" x2="640" y2="198" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowWx)" opacity="0.85"/>

  <rect x="330" y="204" width="620" height="80" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6"/>
  <text x="640" y="230" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="2" font-weight="600">geocode_candidates() — coarsening retry ladder</text>
  <text x="640" y="252" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">"123 Main St, San Jose, CA" → "San Jose, CA" → "CA"</text>
  <text x="640" y="270" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">"Tampa Florida" → "Tampa, Florida" → "Tampa"  (OWM /geo/1.0/direct)</text>

  <line x1="640" y1="284" x2="640" y2="318" stroke="#7c5cff" stroke-width="1.6" marker-end="url(#arrowWx)" opacity="0.85"/>

  <rect x="180" y="324" width="440" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="204" cy="350" r="5" fill="#4a6cf6"/>
  <text x="400" y="356" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">days≤1 / when=current</text>
  <text x="400" y="376" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">GET /data/2.5/weather</text>

  <rect x="660" y="324" width="440" height="66" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <circle cx="684" cy="350" r="5" fill="#4a6cf6"/>
  <text x="880" y="356" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">days≥2 / tomorrow / week</text>
  <text x="880" y="376" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">GET /data/2.5/forecast → group_by_date → summarise_points</text>

  <line x1="400" y1="390" x2="400" y2="418" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowWx)" opacity="0.7"/>
  <line x1="880" y1="390" x2="880" y2="418" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowWx)" opacity="0.7"/>

  <rect x="180" y="424" width="920" height="56" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
  <text x="640" y="450" text-anchor="middle" fill="#e8e3f7" font-size="13" font-weight="600">dual_temp / dual_range / dual_wind — always both °F and °C</text>
  <text x="640" y="468" text-anchor="middle" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">+ what_to_wear() — pure rule-based clothing suggestion, never an LLM call</text>

  <rect x="150" y="494" width="980" height="46" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="522" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">Always fetched in metric (Celsius); OPENWEATHER_UNITS is not consulted</text>
</svg>
