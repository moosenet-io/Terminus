<svg width="1280" height="480" viewBox="0 0 1280 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgmap" cx="50%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowMap" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowMap" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="480" fill="url(#bgmap)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="13" letter-spacing="6" font-weight="500">DOCUMENTATION MAP</text>
  <text x="640" y="76" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="2">docs/README.md · SITE INDEX</text>

  <!-- root node -->
  <rect x="540" y="106" width="200" height="52" rx="10" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowMap)"/>
  <text x="640" y="137" text-anchor="middle" fill="#e8e3f7" font-size="14" font-weight="600">README.md</text>

  <!-- connectors down to 5 areas -->
  <line x1="640" y1="158" x2="200" y2="210" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowMap)" opacity="0.8"/>
  <line x1="640" y1="158" x2="450" y2="210" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowMap)" opacity="0.8"/>
  <line x1="640" y1="158" x2="640" y2="210" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowMap)" opacity="0.8"/>
  <line x1="640" y1="158" x2="830" y2="210" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowMap)" opacity="0.8"/>
  <line x1="640" y1="158" x2="1080" y2="210" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowMap)" opacity="0.8"/>

  <g font-size="12.5" font-weight="600">
    <g>
      <rect x="90" y="212" width="220" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="112" cy="234" r="5" fill="#8b5cf6"/><text x="126" y="238" fill="#e8e3f7">architecture/</text>
      <text x="110" y="258" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">federation · auth</text>
      <text x="110" y="272" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">chord-integration</text>
    </g>
    <g>
      <rect x="340" y="212" width="220" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="362" cy="234" r="5" fill="#4a6cf6"/><text x="376" y="238" fill="#e8e3f7">networking/</text>
      <text x="360" y="258" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">wireguard</text>
      <text x="360" y="272" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">tailscale</text>
    </g>
    <g>
      <rect x="580" y="212" width="220" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="602" cy="234" r="5" fill="#4a6cf6"/><text x="616" y="238" fill="#e8e3f7">deploy/</text>
      <text x="600" y="258" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">client</text>
      <text x="600" y="272" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">personal-services</text>
    </g>
    <g>
      <rect x="820" y="212" width="220" height="70" rx="10" fill="#241c42" stroke="#5b4b9b" stroke-width="1"/>
      <circle cx="842" cy="234" r="5" fill="#8b5cf6"/><text x="856" y="238" fill="#e8e3f7">tools/</text>
      <text x="840" y="258" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">51 modules · 5 domains</text>
      <text x="840" y="272" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">by domain</text>
    </g>
    <g>
      <rect x="1060" y="212" width="200" height="70" rx="10" fill="#241c42" stroke="#10b981" stroke-width="1.3"/>
      <circle cx="1082" cy="234" r="5" fill="#10b981"/><text x="1096" y="238" fill="#e8e3f7">tools/mint/</text>
      <text x="1080" y="258" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">flagship harness</text>
      <text x="1080" y="272" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">intake · sweep · gpu</text>
    </g>
