  <!-- tools/ fans out to per-tool pages -->
  <line x1="930" y1="282" x2="930" y2="320" stroke="#7c5cff" stroke-width="1.2" marker-end="url(#arrowMap)" opacity="0.7"/>
  <rect x="700" y="322" width="460" height="60" rx="10" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="930" y="348" text-anchor="middle" fill="#cbc4e6" font-size="12" font-weight="600">docs/tools/&lt;domain&gt;/&lt;tool&gt;.md</text>
  <text x="930" y="366" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">one reference page per tool, linked from the domain index</text>

  <!-- governance-style footer band -->
  <rect x="90" y="404" width="1100" height="46" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="432" text-anchor="middle" fill="#8d84ad" font-size="11" letter-spacing="0.4">Every sub-page links back to this index — start at docs/README.md, drill into the area you need.</text>
