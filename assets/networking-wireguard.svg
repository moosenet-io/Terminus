<svg width="1280" height="600" viewBox="0 0 1280 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgWg" cx="50%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowWg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowWg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
  </defs>

  <rect width="1280" height="600" fill="url(#bgWg)"/>

  <text x="640" y="50" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="7" font-weight="500">NETWORKING · WIREGUARD</text>
  <text x="640" y="86" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">CLIENT → WIREGUARD TUNNEL → PRIMARY GATEWAY</text>
  <line x1="440" y1="104" x2="840" y2="104" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- Client -->
  <rect x="60" y="220" width="240" height="110" rx="12" fill="#221a3d" stroke="#5b4b9b" stroke-width="1.2" filter="url(#cardShadowWg)"/>
  <text x="180" y="252" text-anchor="middle" fill="#e8e3f7" font-size="16" font-weight="600">Your host</text>
  <text x="180" y="274" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">wg0 · &lt;your-host&gt;</text>
  <text x="180" y="292" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">terminus-client-daemon</text>
  <text x="180" y="310" text-anchor="middle" fill="#9b92c0" font-size="11" font-family="'Courier New',monospace">MCP client (loopback)</text>

  <!-- WG tunnel -->
  <line x1="300" y1="275" x2="470" y2="275" stroke="#4a6cf6" stroke-width="2.2" marker-end="url(#arrowWg)"/>
  <text x="385" y="255" text-anchor="middle" fill="#9fb4ff" font-size="11.5" font-weight="600">WireGuard tunnel</text>
  <text x="385" y="300" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">UDP · encrypted</text>

  <!-- Tunnel cloud -->
  <ellipse cx="385" cy="275" rx="90" ry="46" fill="#1d1736" stroke="#4a6cf6" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.55"/>

  <!-- Primary gateway -->
  <rect x="470" y="200" width="280" height="150" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowWg)"/>
  <text x="610" y="230" text-anchor="middle" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">PRIMARY GATEWAY HOST</text>
  <circle cx="500" cy="256" r="4" fill="#8b5cf6"/>
  <text x="512" y="260" fill="#e8e3f7" font-size="12.5" font-weight="600">terminus-primary</text>
  <text x="512" y="278" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">plain enroll port (JSON /enroll)</text>
  <text x="512" y="294" fill="#9b92c0" font-size="10.5" font-family="'Courier New',monospace">mTLS port (client-cert required)</text>
  <text x="610" y="330" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">bound to the wg0 interface only</text>

  <!-- arrow to Chord -->
  <line x1="750" y1="275" x2="900" y2="275" stroke="#7c5cff" stroke-width="1.8" marker-end="url(#arrowWg)"/>
  <rect x="900" y="230" width="220" height="90" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1" filter="url(#cardShadowWg)"/>
  <circle cx="922" cy="256" r="5" fill="#10b981"/>
  <text x="936" y="260" fill="#e8e3f7" font-size="13.5" font-weight="600">Chord</text>
  <text x="922" y="280" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">inference proxy</text>
  <text x="922" y="296" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">(separate repo/process)</text>

  <!-- governance band -->
  <rect x="60" y="420" width="1160" height="90" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="450" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">THE TUNNEL ONLY GETS YOU ROUTABLE — IT DOES NOT AUTHENTICATE YOU</text>
  <text x="640" y="472" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">enrollment (shared secret → cert + JWT) and the mTLS handshake are what authorize the connection</text>
  <text x="640" y="492" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">TERMINUS_PRIMARY_URL / TERMINUS_MTLS_HOST point at the tunnel address, not a public one</text>

  <text x="640" y="558" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">A self-hosted point-to-point mesh — you run both ends, no third-party control plane.</text>
</svg>
