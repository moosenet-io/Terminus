<svg width="1280" height="1400" viewBox="0 0 1280 1400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bgErd" cx="50%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#241a3f"/><stop offset="55%" stop-color="#1a1430"/><stop offset="100%" stop-color="#0d0a1c"/>
    </radialGradient>
    <filter id="cardShadowE" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowE" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#7c5cff"/></marker>
    <marker id="arrowSoft" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#4a6cf6"/></marker>
  </defs>

  <rect width="1280" height="1400" fill="url(#bgErd)"/>

  <text x="640" y="46" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">MINT · MODEL-INTAKE HARNESS</text>
  <text x="640" y="82" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">DATA MODEL · TABLES, VIEWS &amp; KEYS</text>
  <line x1="430" y1="100" x2="850" y2="100" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

  <!-- ===== S83 pre-existing (shared DB) band ===== -->
  <text x="70" y="130" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">S83 · PRE-EXISTING IN SHARED DB (storage.rs only INSERTs/SELECTs — never CREATEs)</text>

  <!-- model_profiles -->
  <rect x="70" y="144" width="290" height="150" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <circle cx="94" cy="168" r="5" fill="#4a6cf6"/>
  <text x="108" y="173" fill="#e8e3f7" font-size="14" font-weight="700">model_profiles</text>
  <text x="90" y="192" fill="#a89fc8" font-size="10.3" font-family="'Courier New',monospace">PK id UUID</text>
  <g font-size="10.3" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="90" y="208">model_name TEXT</text>
    <text x="90" y="222">provider TEXT</text>
    <text x="90" y="236">vram_gb DOUBLE PRECISION</text>
    <text x="90" y="250">reported_context_window INT</text>
    <text x="90" y="264">profile_date (order key)</text>
  </g>
  <text x="90" y="282" fill="#8d84ad" font-size="9.5">writer: storage::insert_model_profile</text>

  <!-- context_profile_runs -->
  <rect x="390" y="144" width="290" height="150" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <circle cx="414" cy="168" r="5" fill="#4a6cf6"/>
  <text x="428" y="173" fill="#e8e3f7" font-size="14" font-weight="700">context_profile_runs</text>
  <text x="410" y="192" fill="#a89fc8" font-size="10.3" font-family="'Courier New',monospace">PK id UUID · FK profile_id</text>
  <g font-size="10.1" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="410" y="208">context_tokens INT</text>
    <text x="410" y="222">throughput_tok_per_sec, ttft_ms</text>
    <text x="410" y="236">recall_score, coherence_score</text>
    <text x="410" y="250">memory_usage_mb, oom BOOL, error</text>
  </g>
  <text x="410" y="282" fill="#8d84ad" font-size="9.5">writer: storage::insert_context_run</text>

  <!-- model_operational_profiles -->
  <rect x="710" y="144" width="300" height="150" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <circle cx="734" cy="168" r="5" fill="#4a6cf6"/>
  <text x="748" y="173" fill="#e8e3f7" font-size="14" font-weight="700">model_operational_profiles</text>
  <text x="730" y="192" fill="#a89fc8" font-size="10.3" font-family="'Courier New',monospace">PK id UUID · FK profile_id</text>
  <g font-size="9.8" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="730" y="207">max_context_safe/absolute, quality_degradation_point</text>
    <text x="730" y="221">throughput_at_2k/8k/16k/32k/64k</text>
    <text x="730" y="235">recommended_timeout_chat/build/deep_sec, overall_tier</text>
    <text x="730" y="249">approved_languages TEXT[], max_files_good/marginal</text>
    <text x="730" y="263">agent_tool_accuracy, agent_multistep_accuracy</text>
  </g>
  <text x="730" y="282" fill="#8d84ad" font-size="9.5">self-healing CREATE TABLE IF NOT EXISTS (storage.rs)</text>

  <!-- agent_profile_runs -->
  <rect x="1030" y="144" width="180" height="150" rx="12" fill="#241c42" stroke="#5b4b9b" stroke-width="1.3" filter="url(#cardShadowE)" opacity="0.85"/>
  <circle cx="1054" cy="168" r="5" fill="#4a6cf6"/>
  <text x="1068" y="173" fill="#e8e3f7" font-size="13" font-weight="700">agent_profile_runs</text>
  <text x="1050" y="192" fill="#a89fc8" font-size="9.6" font-family="'Courier New',monospace">PK id · FK profile_id</text>
  <g font-size="9.3" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="1050" y="207">test_name, tool_count_available</text>
    <text x="1050" y="221">correct_tool_selected, tool_params_valid</text>
    <text x="1050" y="235">multi_step_completed, hallucination</text>
    <text x="1050" y="249">response_quality_score, total_time_ms</text>
  </g>
  <text x="1050" y="282" fill="#8d84ad" font-size="9">no FK enforced from run_score_points</text>

  <!-- arrows model_profiles -> the three run tables -->
  <line x1="360" y1="200" x2="390" y2="200" stroke="#4a6cf6" stroke-width="1.4" marker-end="url(#arrowSoft)" opacity="0.8"/>
  <line x1="360" y1="220" x2="710" y2="220" stroke="#4a6cf6" stroke-width="1.2" marker-end="url(#arrowSoft)" opacity="0.55"/>
  <line x1="360" y1="240" x2="1030" y2="240" stroke="#4a6cf6" stroke-width="1.2" marker-end="url(#arrowSoft)" opacity="0.4"/>

  <!-- ===== code_profile_runs (owned by storage.rs, CREATEd via assistant migrate) ===== -->
  <text x="70" y="330" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">code_profile_runs · S83 table, columns ADDED by assistant::schema::migrate()</text>
  <rect x="70" y="344" width="560" height="192" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowE)"/>
  <text x="94" y="370" fill="#e8e3f7" font-size="15" font-weight="700">code_profile_runs</text>
  <text x="94" y="388" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">FK profile_id → model_profiles.id (no id PK on v1 rows; v2 rows RETURNING id UUID)</text>
  <g font-size="10.2" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="94" y="406">language, task_type, context_tokens, file_count, total_lines</text>
    <text x="94" y="422">compiles, tests_pass, planted_bug_found (v1) · first_pass_score,</text>
    <text x="94" y="438">retry_score, change_correct, case_id (v2, harness_version='v2')</text>
    <text x="94" y="454">code_quality_score, throughput_tok_per_sec, total_time_ms, oom, error</text>
    <text x="94" y="470">backend_tag TEXT ('gpu'|'cpu') · mem_config TEXT (e.g. 'dynamic_gtt')</text>
    <text x="94" y="486">finalized BOOL NOT NULL DEFAULT true (v2 Phase-1 explicit false)</text>
    <text x="94" y="502">well_formed BOOL · sample_index SMALLINT NOT NULL DEFAULT 0</text>
    <text x="94" y="518">vuln_finding_count INT (heuristic scanner, NOT real SAST)</text>
  </g>

  <!-- run_score_points -->
  <rect x="670" y="344" width="540" height="192" rx="12" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowE)"/>
  <text x="694" y="370" fill="#e8e3f7" font-size="15" font-weight="700">run_score_points</text>
  <text x="694" y="388" fill="#a89fc8" font-size="10.5" font-family="'Courier New',monospace">PK id BIGSERIAL · long-format sidecar (multi-point-score-tracking)</text>
  <g font-size="10.2" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="694" y="406">code_run_id UUID REFERENCES code_profile_runs(id) ON DELETE CASCADE</text>
    <text x="694" y="422">context_run_id UUID (no FK — table absent in prod, verified)</text>
    <text x="694" y="438">agent_run_id UUID (no FK — table absent in prod, verified)</text>
    <text x="694" y="454">profile_id UUID NOT NULL REFERENCES model_profiles(id)</text>
    <text x="694" y="470">axis, x_value DOUBLE PRECISION, x_label, metric, value</text>
  </g>
  <rect x="694" y="480" width="490" height="44" rx="8" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="708" y="498" fill="#cbc4e6" font-size="10" font-weight="600">CHECK one_parent: exactly one of code/context/agent_run_id NOT NULL</text>
  <text x="708" y="514" fill="#8d84ad" font-size="9.3" font-family="'Courier New',monospace">idx_rsp_profile_axis_metric (profile_id, axis, metric)</text>

  <line x1="450" y1="536" x2="920" y2="536" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowE)" opacity="0.7"/>
  <text x="560" y="530" fill="#8d84ad" font-size="9.5" font-family="'Courier New',monospace">code_run_id FK (ON DELETE CASCADE)</text>

  <!-- ===== S84 assistant tables ===== -->
  <text x="70" y="580" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">S84 · assistant/schema.rs OWNS &amp; CREATEs (idempotent, advisory-lock serialized)</text>

  <rect x="70" y="594" width="330" height="130" rx="12" fill="#241c42" stroke="#10b981" stroke-width="1.4" filter="url(#cardShadowE)"/>
  <circle cx="94" cy="618" r="5" fill="#10b981"/>
  <text x="108" y="623" fill="#e8e3f7" font-size="14" font-weight="700">assistant_profile_run</text>
  <text x="90" y="642" fill="#a89fc8" font-size="10.3" font-family="'Courier New',monospace">PK id UUID</text>
  <g font-size="10.2" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="90" y="658">started_at TIMESTAMPTZ DEFAULT now()</text>
    <text x="90" y="672">harness_version TEXT NOT NULL</text>
  </g>
  <text x="90" y="700" fill="#8d84ad" font-size="9.5">writer: assistant::schema::insert_run</text>

  <rect x="430" y="594" width="420" height="130" rx="12" fill="#241c42" stroke="#10b981" stroke-width="1.4" filter="url(#cardShadowE)"/>
  <circle cx="454" cy="618" r="5" fill="#10b981"/>
  <text x="468" y="623" fill="#e8e3f7" font-size="14" font-weight="700">assistant_dimension_score</text>
  <text x="450" y="642" fill="#a89fc8" font-size="10.1" font-family="'Courier New',monospace">PK id BIGSERIAL · FK run_id → assistant_profile_run(id) CASCADE</text>
  <g font-size="9.7" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="450" y="658">model_id, backend_tag CHECK IN('gpu','cpu'), dimension, metric</text>
    <text x="450" y="672">value DOUBLE PRECISION NOT NULL, std_dev, judge, low_confidence</text>
    <text x="450" y="686">raw_json JSONB · task_category DEFAULT 'assistant' · mem_config</text>
  </g>
  <text x="450" y="712" fill="#8d84ad" font-size="9.3">idx (model_id,backend_tag,task_category) · idx(run_id)</text>

  <line x1="400" y1="659" x2="430" y2="659" stroke="#10b981" stroke-width="1.4" marker-end="url(#arrowE)" opacity="0.8"/>

  <!-- ===== S85 serving table ===== -->
  <text x="890" y="580" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">S85 · serving/schema.rs OWNS &amp; CREATEs</text>
  <rect x="890" y="594" width="320" height="130" rx="12" fill="#241c42" stroke="#10b981" stroke-width="1.4" filter="url(#cardShadowE)"/>
  <circle cx="914" cy="618" r="5" fill="#10b981"/>
  <text x="928" y="623" fill="#e8e3f7" font-size="14" font-weight="700">serving_profile</text>
  <text x="910" y="642" fill="#a89fc8" font-size="10.1" font-family="'Courier New',monospace">PK id BIGSERIAL · UNIQUE(model_id,backend_tag)</text>
  <g font-size="9.5" font-family="'Courier New',monospace" fill="#cbc4e6">
    <text x="910" y="658">backend_tag IN('llama-gpu','ollama-gpu','cpu')</text>
    <text x="910" y="672">best_runtime, env_json JSONB, tok_s, keep_warm</text>
    <text x="910" y="686">exclusion_reason, recheck_trigger (coherence CHECK)</text>
  </g>
  <text x="910" y="712" fill="#8d84ad" font-size="9.3">writer: upsert_serving_profile (ON CONFLICT UPSERT)</text>

  <!-- ===== VIEWS band ===== -->
  <text x="70" y="770" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">VIEWS · derived, FK-free, dropped+recreated on every migrate()</text>

  <rect x="70" y="784" width="520" height="180" rx="14" fill="#19161f" stroke="#3a3358" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <text x="94" y="810" fill="#cbc4e6" font-size="14" font-weight="700">model_dual_profile</text>
  <text x="94" y="828" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">assistant/schema.rs · CREATE OR REPLACE VIEW (drop+recreate)</text>
  <g font-size="10" font-family="'Courier New',monospace" fill="#a89fc8">
    <text x="94" y="848">builder CTE: model_profiles ⨝ code_profile_runs</text>
    <text x="94" y="862">  GROUP BY model_name, backend_tag, mem_config</text>
    <text x="94" y="878">assistant CTE: assistant_dimension_score</text>
    <text x="94" y="892">  WHERE task_category='assistant' GROUP BY model_id,backend_tag,mem_config</text>
    <text x="94" y="908">keys = UNION of both CTEs' (model_id,backend_tag,mem_config)</text>
    <text x="94" y="924">LEFT JOIN both onto keys (IS NOT DISTINCT FROM on nullable cols)</text>
  </g>
  <text x="94" y="948" fill="#8d84ad" font-size="9.3">reader: assistant::schema::reconcile()</text>

  <rect x="630" y="784" width="580" height="180" rx="14" fill="#19161f" stroke="#3a3358" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <text x="654" y="810" fill="#cbc4e6" font-size="14" font-weight="700">model_full_profile</text>
  <text x="654" y="828" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">serving/schema.rs · extends dual-profile with serving_profile</text>
  <g font-size="9.7" font-family="'Courier New',monospace" fill="#a89fc8">
    <text x="654" y="848">builder CTE (mem_config-keyed) · assistant CTE (model_id-only,</text>
    <text x="654" y="862">  coarser — mem_config split here would cross-join wrongly)</text>
    <text x="654" y="878">serving CTE: serving_profile, count/keep_warm/backends per model</text>
    <text x="654" y="894">keys = UNION(builder.model_id, assistant.model_id, serving.model_id)</text>
    <text x="654" y="910">LEFT JOIN all three onto keys, keyed on model_id ONLY</text>
    <text x="654" y="926">(3 sides use incompatible backend-tag vocabularies — gpu/cpu vs.</text>
    <text x="654" y="940">llama-gpu/ollama-gpu/cpu — so no shared backend_tag join column)</text>
  </g>

  <line x1="590" y1="874" x2="630" y2="874" stroke="#7c5cff" stroke-width="1.4" marker-end="url(#arrowE)" opacity="0.7"/>

  <!-- ===== materialized view ===== -->
  <rect x="70" y="984" width="1140" height="106" rx="14" fill="#19161f" stroke="#3a3358" stroke-width="1.3" filter="url(#cardShadowE)"/>
  <text x="94" y="1008" fill="#cbc4e6" font-size="13.5" font-weight="700">model_language_stats  (MATERIALIZED VIEW — snapshot, no auto-refresh wired)</text>
  <text x="94" y="1026" fill="#8d84ad" font-size="10" font-family="'Courier New',monospace">assistant/schema.rs · DROP + CREATE every migrate() call (not IF NOT EXISTS — column list must evolve)</text>
  <g font-size="9.8" font-family="'Courier New',monospace" fill="#a89fc8">
    <text x="94" y="1046">per (profile_id, language): n_scored, mean/stddev score, retry_lift, mean throughput/latency, p95 latency,</text>
    <text x="94" y="1062">total_gpu_seconds, quality_per_gpu_second, malformed_rate, error_rate, mean_vuln_findings, pass_at_3, pass_hat_3</text>
    <text x="94" y="1078">scoped to mem_config = 'dynamic_gtt' only · refresh: REFRESH MATERIALIZED VIEW model_language_stats (manual op)</text>
  </g>

  <!-- ===== connection / fallback contract ===== -->
  <rect x="70" y="1112" width="1140" height="120" rx="14" fill="#1d1736" stroke="#7c5cff" stroke-width="1.6" filter="url(#cardShadowE)"/>
  <text x="94" y="1138" fill="#a78bff" font-size="12.5" letter-spacing="3" font-weight="600">CONNECTION CONTRACT · config::intake_database_url()</text>
  <g font-size="12" font-family="'Courier New',monospace" fill="#e8e3f7">
    <text x="94" y="1164">INTAKE_DATABASE_URL  (preferred, checked first)</text>
    <text x="94" y="1182">  ↓ unset or blank</text>
    <text x="94" y="1200">DATABASE_URL  (fallback — same shared DB every S83/S84/S85 pool uses)</text>
  </g>
  <text x="94" y="1220" fill="#8d84ad" font-size="9.8">both storage::get_pool(), assistant::schema::get_pool(), serving::schema::get_pool() delegate to this ONE resolver</text>

  <!-- governance band -->
  <rect x="150" y="1260" width="976" height="70" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="1286" text-anchor="middle" fill="#cbc4e6" font-size="13" font-weight="600">MIGRATION MECHANICS · assistant::schema::migrate() is advisory-lock serialized (pg_advisory_lock)</text>
  <text x="640" y="1306" text-anchor="middle" fill="#8d84ad" font-size="11" font-family="'Courier New',monospace">dedicated conn.close_on_drop() · lock key = sha256("terminus_assistant_schema_migrate")[:8] as i64 · idempotent</text>
  <text x="640" y="1322" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">serving::schema::migrate() is NOT lock-guarded and does not call assistant's migrate — both are called independently by mint</text>

  <text x="640" y="1370" text-anchor="middle" fill="#564d75" font-size="11.5" letter-spacing="0.4">Four writer modules, one shared Postgres — tables own their own creation, views reconcile across them.</text>
</svg>
