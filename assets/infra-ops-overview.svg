  <rect x="150" y="586" width="980" height="66" rx="12" fill="#19161f" stroke="#3a3358" stroke-width="1"/>
  <text x="640" y="610" text-anchor="middle" fill="#cbc4e6" font-size="12.5" font-weight="600">Every host/user/key/URL comes from an env var — no hardcoded IPs, hostnames, or credentials anywhere in this domain</text>
  <text x="640" y="630" text-anchor="middle" fill="#8d84ad" font-size="10.5" font-family="'Courier New',monospace">3 GUARDED modules gate through approval::gate() · 11 read-only or fixed-command · zero self-serve secret paths</text>
