  <rect width="1280" height="680" fill="url(#bg2)"/>

  <text x="640" y="50" text-anchor="middle" fill="#b9b0d8" font-size="14" letter-spacing="6" font-weight="500">TERMINUS · INFRA &amp; OPS DOMAIN</text>
  <text x="640" y="86" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="2">14 MODULES · ~76 TOOLS</text>
  <line x1="470" y1="104" x2="810" y2="104" stroke="#6b5bbf" stroke-width="1" opacity="0.5"/>

