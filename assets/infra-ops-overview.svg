  <text x="150" y="150" fill="#f0b8b8" font-size="12.5" letter-spacing="3" font-weight="600">GUARDED — approval gate required</text>
  <g font-size="12.5" font-weight="600">
    <rect x="150" y="164" width="230" height="70" rx="10" fill="#2b1c22" stroke="#e85c5c" stroke-width="1.2"/>
