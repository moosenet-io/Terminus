    <circle cx="922" cy="428" r="5" fill="#10b981"/><text x="936" y="432" fill="#e8e3f7">sentinel</text>
    <text x="920" y="452" fill="#8fe3c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">3 tools · ops checks</text>

    <rect x="150" y="484" width="230" height="70" rx="10" fill="#132a22" stroke="#10b981" stroke-width="1"/>
    <circle cx="172" cy="508" r="5" fill="#10b981"/><text x="186" y="512" fill="#e8e3f7">vigil</text>
    <text x="170" y="532" fill="#8fe3c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">2 tools · briefings</text>

    <rect x="400" y="484" width="230" height="70" rx="10" fill="#132a22" stroke="#10b981" stroke-width="1"/>
    <circle cx="422" cy="508" r="5" fill="#10b981"/><text x="436" y="512" fill="#e8e3f7">dashboard (gateway)</text>
    <text x="420" y="532" fill="#8fe3c0" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">6 tools · Homepage YAML</text>

    <rect x="650" y="484" width="230" height="70" rx="10" fill="#241c42" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="672" cy="508" r="5" fill="#8b5cf6"/><text x="686" y="512" fill="#e8e3f7">sundry</text>
    <text x="670" y="532" fill="#a89fc8" font-size="10.5" font-weight="400" font-family="'Courier New',monospace">6 tools · misc/health/search</text>
