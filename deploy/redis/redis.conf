# BLD-20 — Redis owned by terminus-primary (the fleet's ONE shared Redis).
#
# This is a TEMPLATE. `deploy/redis/install.sh` renders it to the runtime config
# path, substituting the `__TOKEN__` placeholders below from environment values
# that are MATERIALIZED FROM THE VAULT at provision time. No real endpoint, IP,
# interface, port, or password appears in this tracked file (S1/S7).
#
# Consumers (all via src/redis + typed namespaces): sccache shared cache
# (BLD-05, volatile), the compiler queue/scheduler (BLD-06, durable), the Plane
# prefix-registry overlay (durable, cross-instance), and the proxy
# rate-limiter/queue (volatile).

################################## NETWORK #####################################

# Bind loopback + the mesh interface ONLY. `__REDIS_BIND__` is rendered to a
# space-separated list like `127.0.0.1 <mesh-ip>` from $REDIS_BIND. NEVER
# 0.0.0.0 — install.sh asserts this before enabling the service.
bind __REDIS_BIND__
port __REDIS_PORT__

# Defence in depth: even if bind were ever mis-set, protected-mode refuses
# non-loopback connections that have not authenticated.
protected-mode yes

# TCP keepalive so dead peers are reaped (matches the client's keep-alive).
tcp-keepalive 300
timeout 0

#################################### AUTH ######################################

# Password rendered from $REDIS_REQUIREPASS (vault-materialized). A no-auth
# connect is refused. install.sh asserts this is non-empty before enabling.
requirepass __REDIS_REQUIREPASS__

################################## PERSISTENCE ##################################

# Appendonly ON for the DURABLE keyspaces (queue/overlay) — they must survive a
# restart. everysec balances durability vs latency.
appendonly yes
appendfilename "terminus-primary.aof"
appendfsync everysec
dir __REDIS_DATA_DIR__

# RDB snapshots as a coarse backstop for the AOF.
save 900 1
save 300 10
save 60 10000

################################### MEMORY #####################################

# maxmemory caps the instance. Redis eviction policy is GLOBAL (not per-DB), so
# we protect the durable keyspaces with `volatile-lru`: ONLY keys that carry a
# TTL are eligible for eviction. Durable keys (queue:*, prefix:* — DB
# __REDIS_DB_DURABLE__) are written with NO expiry and are therefore NEVER
# evicted; volatile keys (ratelimit:*, sccache:* — DB __REDIS_DB_VOLATILE__) are
# written WITH a TTL and are the only eviction candidates. This is the practical
# equivalent of "noeviction for the durable DB, LRU for the volatile DB" that
# Redis's single global policy allows.
maxmemory __REDIS_MAXMEMORY__
maxmemory-policy volatile-lru

# Logical DB separation for operational clarity + keyspace isolation
# (databases count must cover both indices).
databases 16

################################## HARDENING ###################################

# Rename/disable the most dangerous admin commands (empty string disables).
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
